<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interativo: Saneamento Básico em Novorizonte - MG</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            bg: '#FDFBF7',     /* Fundo principal areia claro */
                            peach: '#E8C3B3',  /* Pêssego pastel */
                            blue: '#B9D2D0',   /* Azul pastel */
                            green: '#CDE0C0',  /* Verde pastel */
                            sand: '#F2E8D3',   /* Areia */
                            ink: '#2B2624',    /* Tinta escura/Marrom */
                            text: '#4A4440',   /* Texto secundário */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    boxShadow: {
                        'woodcut': '6px 6px 0px 0px rgba(43, 38, 36, 1)',
                        'woodcut-sm': '4px 4px 0px 0px rgba(43, 38, 36, 1)',
                        'woodcut-lg': '12px 12px 0px 0px rgba(43, 38, 36, 1)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Desabilita o scroll nativo, pois o mapa é "arrastável" */
        body {
            background-color: #FDFBF7;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            touch-action: none; /* Previne comportamentos de scroll no mobile para focar no drag */
        }

        .map-texture {
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
        }

        /* Grade Cartográfica de fundo */
        .map-grid {
            background-image: 
                linear-gradient(rgba(43, 38, 36, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(43, 38, 36, 0.05) 2px, transparent 2px),
                linear-gradient(rgba(43, 38, 36, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(43, 38, 36, 0.02) 1px, transparent 1px);
            background-size: 200px 200px, 200px 200px, 40px 40px, 40px 40px;
            background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
        }

        .woodcut-bg {
            position: absolute;
            opacity: 0.25;
            pointer-events: none;
            mix-blend-mode: multiply;
            filter: grayscale(100%) contrast(1.2);
        }

        .custom-border { border: 2px solid #2B2624; }

        /* Cursores para o mapa */
        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing !important; }

        /* Scrollbar elegante */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(43, 38, 36, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background-color: rgba(43, 38, 36, 0.4); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Ícones Inline SVG ---
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconChevronDown = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
        const IconCheckCircle2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconLeaf = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconZoomIn = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const IconZoomOut = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const IconCompass = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;

        // --- COMPONENTE SLIDESHOW (Adaptado para o painel lateral) ---
        const Slideshow = ({ images }) => {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => { setCurrentIndex(0); }, [images]);

            useEffect(() => {
                if (!images || images.length <= 1) return;
                const interval = setInterval(() => {
                    setCurrentIndex((prev) => (prev + 1) % images.length);
                }, 3500); 
                return () => clearInterval(interval);
            }, [images]);

            return (
                <div className="w-full h-64 md:h-80 custom-border shadow-woodcut-sm bg-pastel-sand overflow-hidden relative group flex items-center justify-center mt-6">
                    {images.map((img, index) => (
                        <img
                            key={index}
                            src={img}
                            alt={`Imagem ${index + 1}`}
                            className={`absolute inset-0 w-full h-full object-contain p-2 transition-opacity duration-1000 ease-in-out ${index === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}
                        />
                    ))}
                    {images.length > 1 && (
                        <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-2 z-20">
                            {images.map((_, idx) => (
                                <button 
                                    key={idx} 
                                    onClick={() => setCurrentIndex(idx)}
                                    className={`w-2 h-2 rounded-full transition-all border border-pastel-ink/30 shadow-sm ${idx === currentIndex ? 'bg-pastel-ink w-5' : 'bg-pastel-ink/20 hover:bg-pastel-ink/50'}`} 
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // --- GRÁFICOS ---
        const RaceChart = () => {
            const data = [
                { label: 'Parda', val: 3111, bg: 'bg-pastel-peach' },
                { label: 'Branca', val: 1238, bg: 'bg-pastel-sand' },
                { label: 'Preta', val: 210, bg: 'bg-pastel-blue' },
                { label: 'Indígena', val: 10, bg: 'bg-pastel-green' },
                { label: 'Amarela', val: 2, bg: 'bg-white' },
            ];
            return (
                <div className="space-y-2 mt-4">
                    {data.map(d => (
                        <div key={d.label} className="flex items-center text-xs font-sans font-bold text-pastel-ink uppercase tracking-wider">
                            <span className="w-16 truncate">{d.label}</span>
                            <div className="flex-1 h-3 bg-white custom-border mx-2 overflow-hidden flex">
                                <div className={`h-full border-r-2 border-pastel-ink ${d.bg}`} style={{width: `${(d.val/4571)*100}%`}}></div>
                            </div>
                            <span className="w-8 text-right">{d.val}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const PyramidChart = () => {
            const data = [
                { age: '60+', m: 18, f: 20 },
                { age: '40-59', m: 28, f: 30 },
                { age: '20-39', m: 34, f: 32 },
                { age: '0-19', m: 20, f: 18 },
            ];
            return (
                <div className="flex flex-col space-y-2 mt-4">
                    <div className="flex justify-between text-[10px] font-bold uppercase text-pastel-ink mb-1">
                        <span>Homens</span>
                        <span>Mulheres</span>
                    </div>
                    {data.map(d => (
                        <div key={d.age} className="flex items-center justify-center text-[10px] font-sans font-bold text-pastel-ink">
                            <div className="flex-1 flex justify-end">
                                <div className="h-3 bg-pastel-blue custom-border border-r-0" style={{width: `${d.m}%`}}></div>
                            </div>
                            <span className="w-10 text-center bg-white custom-border py-0.5 z-10 leading-none">{d.age}</span>
                            <div className="flex-1 flex justify-start">
                                <div className="h-3 bg-pastel-peach custom-border border-l-0" style={{width: `${d.f}%`}}></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- CONTEÚDO DOS PAINÉIS LATERAIS ---
        
        // 1. Qual o problema?
        const ProblemaContent = () => {
            const [activeStep, setActiveStep] = useState(0);
            const steps = [
                { title: "Déficits nos Eixos do Saneamento", desc: "A ausência ou ineficiência na prestação de serviços adequados nos quatro eixos estruturais: abastecimento de água potável, esgotamento sanitário, limpeza urbana e manejo de resíduos sólidos, além da drenagem de águas pluviais.", ref: "Produto D - Prognóstico do Saneamento Básico; Resumo Executivo." },
                { title: "Exclusão Histórica", desc: "A necessidade imperativa de garantir que o saneamento alcance a todos, priorizando populações e grupos historicamente excluídos do acesso ao básico e necessário para uma vida digna.", ref: "Resumo Executivo (Projeto SanBas, p. 2)." },
                { title: "Gestão de Riscos e Semiárido", desc: "A formulação de programas é dificultada pela vulnerabilidade ambiental (como os longos períodos de seca do semiárido) e falhas de infraestrutura.", ref: "Produto E - Programas; Produto D - Prognóstico." }
            ];

            return (
                <div className="space-y-4">
                    {steps.map((step, index) => (
                        <div key={index} className={`custom-border bg-white transition-all overflow-hidden ${activeStep === index ? 'shadow-woodcut-sm' : ''}`}>
                            <button className="w-full px-4 py-4 text-left flex justify-between items-center bg-transparent" onClick={() => setActiveStep(activeStep === index ? -1 : index)}>
                                <span className="font-bold text-pastel-ink font-serif text-lg flex items-center gap-3">
                                    <span className={`flex items-center justify-center shrink-0 w-8 h-8 font-sans text-sm custom-border ${activeStep === index ? 'bg-pastel-peach' : 'bg-pastel-sand'}`}>{index + 1}</span>
                                    {step.title}
                                </span>
                                <IconChevronDown className={`w-6 h-6 transition-transform ${activeStep === index ? 'rotate-180 text-pastel-peach' : 'text-pastel-ink'}`} />
                            </button>
                            <div className={`px-4 transition-all duration-300 ease-in-out border-t-2 border-transparent flex flex-col justify-between ${activeStep === index ? 'py-4 bg-pastel-sand/30 border-pastel-ink max-h-96 opacity-100' : 'max-h-0 py-0 opacity-0'}`}>
                                <p className="text-pastel-text text-base font-sans mb-3 leading-relaxed">{step.desc}</p>
                                <p className="text-[11px] text-pastel-ink/80 italic font-sans border-t border-pastel-ink/10 pt-2"><strong>Ref:</strong> {step.ref}</p>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // 2. Onde será avaliado?
        const OndeContent = () => {
            const [activeTab, setActiveTab] = useState('historia');
            const tabImages = {
                historia: ["https://i.postimg.cc/JhWqTh7r/IMG-20250819-WA0013.jpg", "https://i.postimg.cc/TPX9kP2x/IMG-20250809-151736639.jpg"],
                geografia: ["https://i.postimg.cc/s2Rcn2fR/IMG-20180421-103542037.jpg", "https://i.postimg.cc/8CVHyCpY/IMG-20260113-WA0006.jpg"],
                demografia: ["https://i.postimg.cc/jjrX8jx9/IMG-20250819-WA0014.jpg"],
                socioeconomico: ["https://i.postimg.cc/fbhKHbz1/IMG-20260113-WA0008.jpg"]
            };
            const tabs = {
                historia: { icon: <IconHistory/>, title: "História", content: <p>A ocupação da região remonta ao século XVI com a expedição de Francisco Bruza de Spinosa (1553). O povoado de Indaiá cresceu ao redor de uma igreja construída em mutirão em 1953. O nome "Novorizonte" foi inspirado na vista da chapada local. A emancipação ocorreu em 1995.</p> },
                geografia: { icon: <IconLeaf/>, title: "Geografia", content: <p>Localizado em área de transição entre Cerrado e Mata Atlântica e inserido no semiárido brasileiro. A dinâmica climática de secas e a proteção de barragens e do Rio Jequitinhonha são essenciais.</p> },
                demografia: { icon: <IconUsers/>, title: "Demografia", content: (
                    <div className="space-y-4">
                        <p>População de <strong>4.571 habitantes</strong> (Censo 2022). O município mantém perfil urbano de 83,1%, enquanto 16,9% residem na área rural.</p>
                        <div className="grid grid-cols-1 gap-4">
                            <div className="p-4 border-2 border-pastel-ink bg-pastel-bg"><h4 className="font-serif font-bold mb-2 border-b-2 border-pastel-ink pb-1">Cor ou Raça</h4><RaceChart /></div>
                            <div className="p-4 border-2 border-pastel-ink bg-pastel-bg"><h4 className="font-serif font-bold mb-2 border-b-2 border-pastel-ink pb-1">Pirâmide Etária</h4><PyramidChart /></div>
                        </div>
                    </div>
                ) },
                socioeconomico: { icon: <IconTrendingUp/>, title: "Economia", content: <p>Situado na microrregião de Salinas. A área rural abrange 26 fazendas e comunidades tradicionais geraizeiras. O PIB per capita é de R$ 20.256 e a economia local possui forte vínculo com as águas e a agricultura.</p> }
            };

            return (
                <div className="flex flex-col">
                    <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar mb-4">
                        {Object.keys(tabs).map((key) => (
                            <button key={key} onClick={() => setActiveTab(key)} className={`flex items-center gap-2 px-3 py-2 text-sm whitespace-nowrap font-bold custom-border ${activeTab === key ? 'bg-pastel-blue text-pastel-ink' : 'bg-white hover:bg-pastel-sand'}`}>
                                {tabs[key].icon} {tabs[key].title}
                            </button>
                        ))}
                    </div>
                    <div className="bg-white custom-border p-5 text-pastel-text font-sans text-base leading-relaxed">
                        {tabs[activeTab].content}
                        <Slideshow images={tabImages[activeTab]} />
                    </div>
                </div>
            );
        };

        // 3. Como será avaliado?
        const ComoContent = () => {
            const [checkedItems, setCheckedItems] = useState([false, false, false]);
            const toggleItem = (index) => {
                const newItems = [...checkedItems];
                newItems[index] = !newItems[index];
                setCheckedItems(newItems);
            };
            const metricas = [
                { label: "Cartografia Temática (SIG)", desc: "Mapeamento digital focado em bacias hidrográficas, áreas de risco e infraestrutura de poços/barragens.", ref: "Diagnóstico Técnico-Participativo" },
                { label: "Coleta de Dados e DRP", desc: "Pesquisas socioeconômicas e Diagnóstico Rápido Participativo nas comunidades, complementado por auditorias in loco.", ref: "Metodologias SanBas / IBGE" },
                { label: "Participação Popular", desc: "Audiências públicas, comitês executivos e oficinas para debater os prognósticos com a população local.", ref: "Estratégias de Mobilização Social" }
            ];

            return (
                <div className="space-y-4">
                    {metricas.map((metrica, index) => (
                        <div key={index} onClick={() => toggleItem(index)} className={`cursor-pointer flex items-start gap-4 p-4 custom-border transition-all ${checkedItems[index] ? 'bg-pastel-green/40 shadow-woodcut-sm' : 'bg-white hover:bg-pastel-sand'}`}>
                            <div className={`mt-1 ${checkedItems[index] ? 'text-pastel-ink' : 'text-pastel-text'}`}><IconCheckCircle2 className="w-6 h-6" /></div>
                            <div>
                                <h4 className={`text-lg font-bold font-serif ${checkedItems[index] ? 'text-pastel-ink' : 'text-pastel-text'}`}>{metrica.label}</h4>
                                <div className={`transition-all overflow-hidden ${checkedItems[index] ? 'max-h-64 mt-2 opacity-100' : 'max-h-0 opacity-0'}`}>
                                    <p className="text-sm font-sans mb-2">{metrica.desc}</p>
                                    <p className="text-[11px] italic">Ref: {metrica.ref}</p>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };


        // --- MAPA INTERATIVO ---
        const App = () => {
            // Estado do Mapa
            const [pos, setPos] = useState({ x: 0, y: 0 });
            const [zoom, setZoom] = useState(1);
            const [isDragging, setIsDragging] = useState(false);
            const [activeNode, setActiveNode] = useState(null); // 'problema', 'onde', 'como'
            
            const mapRef = useRef(null);
            const dragStart = useRef({ x: 0, y: 0 });

            // Funções de Arrastar (Pan)
            const handlePointerDown = (e) => {
                if (e.target.closest('.no-drag')) return; // Ignora se clicar no painel ou botões
                setIsDragging(true);
                dragStart.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
                e.target.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                setPos({
                    x: e.clientX - dragStart.current.x,
                    y: e.clientY - dragStart.current.y
                });
            };

            const handlePointerUp = (e) => {
                setIsDragging(false);
                e.target.releasePointerCapture(e.pointerId);
            };

            // Zoom com Scroll do Mouse
            const handleWheel = (e) => {
                if (e.target.closest('.no-drag')) return;
                const zoomDelta = e.deltaY * -0.001;
                setZoom(z => Math.min(Math.max(0.4, z + zoomDelta), 2.5));
            };

            // Centralizar
            const resetView = () => {
                setPos({ x: 0, y: 0 });
                setZoom(1);
                setActiveNode(null);
            };

            // Dados dos Pinos (Markers) no Mapa (Coordenadas baseadas em um canvas de 4000x3000, centro é 0,0)
            const mapNodes = [
                { id: 'problema', x: -600, y: -150, title: '1. A Justificativa', subtitle: 'Qual o problema?', icon: IconTarget, bg: 'bg-pastel-peach', content: <ProblemaContent /> },
                { id: 'onde', x: 0, y: 250, title: '2. O Território', subtitle: 'Onde será avaliado?', icon: IconMapPin, bg: 'bg-pastel-blue', content: <OndeContent /> },
                { id: 'como', x: 650, y: -50, title: '3. A Metodologia', subtitle: 'Como será avaliado?', icon: IconBookOpen, bg: 'bg-pastel-green', content: <ComoContent /> }
            ];

            const activeNodeData = mapNodes.find(n => n.id === activeNode);

            return (
                <div className="w-screen h-screen overflow-hidden relative map-texture map-grid font-sans select-none"
                     onPointerDown={handlePointerDown}
                     onPointerMove={handlePointerMove}
                     onPointerUp={handlePointerUp}
                     onPointerCancel={handlePointerUp}
                     onWheel={handleWheel}>
                    
                    {/* CONTAINER DO MAPA MUNDO (Escalável e Arrastável) */}
                    <div 
                        className={`absolute top-1/2 left-1/2 w-[4000px] h-[3000px] origin-center ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                        style={{ transform: `translate(calc(-50% + ${pos.x}px), calc(-50% + ${pos.y}px)) scale(${zoom})` }}
                    >
                        
                        {/* Imagens de Cenário (Xilogravuras espalhadas pelo mapa) */}
                        <img src="https://i.postimg.cc/Kvn0SL1s/image.png" className="woodcut-bg" style={{ top: '1200px', left: '1200px', width: '400px' }} />
                        <img src="https://i.postimg.cc/GpSQJxfp/image.png" className="woodcut-bg" style={{ top: '1600px', left: '2300px', width: '500px' }} />
                        <img src="https://i.postimg.cc/xCw3BTnQ/image.png" className="woodcut-bg" style={{ top: '1100px', left: '2600px', width: '300px' }} />
                        <img src="https://i.postimg.cc/fTjfgNFT/image.png" className="woodcut-bg" style={{ top: '1800px', left: '1400px', width: '350px' }} />
                        
                        {/* Linha Tracejada Conectando os Pinos (Jornada) */}
                        <svg className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40">
                            <path 
                                d={`M ${2000 + mapNodes[0].x} ${1500 + mapNodes[0].y} 
                                    Q ${2000 + mapNodes[0].x + 300} ${1500 + mapNodes[0].y + 400} ${2000 + mapNodes[1].x} ${1500 + mapNodes[1].y}
                                    Q ${2000 + mapNodes[1].x + 300} ${1500 + mapNodes[1].y - 300} ${2000 + mapNodes[2].x} ${1500 + mapNodes[2].y}`}
                                fill="none" stroke="#2B2624" strokeWidth="6" strokeDasharray="20, 20"
                            />
                        </svg>

                        {/* Pinos Interativos */}
                        {mapNodes.map((node) => {
                            const Icon = node.icon;
                            const isActive = activeNode === node.id;
                            return (
                                <div 
                                    key={node.id}
                                    onClick={(e) => { e.stopPropagation(); setActiveNode(node.id); }}
                                    className={`absolute flex flex-col items-center justify-center transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 no-drag cursor-pointer
                                        ${isActive ? 'scale-110 z-20' : 'hover:scale-105 z-10'}`}
                                    style={{ left: `calc(50% + ${node.x}px)`, top: `calc(50% + ${node.y}px)` }}
                                >
                                    {/* Tooltip / Label */}
                                    <div className="bg-white custom-border shadow-woodcut-sm p-4 mb-4 text-center max-w-[250px] pointer-events-none">
                                        <div className="text-xs font-bold uppercase tracking-wider text-pastel-ink/60">{node.title}</div>
                                        <div className="text-xl font-bold font-serif text-pastel-ink">{node.subtitle}</div>
                                    </div>
                                    
                                    {/* Marcador Visual */}
                                    <div className={`w-20 h-20 rounded-full custom-border shadow-woodcut flex items-center justify-center ${node.bg} ${isActive ? 'ring-8 ring-white/50' : ''}`}>
                                        <Icon className="w-10 h-10 text-pastel-ink" />
                                    </div>
                                    
                                    {/* Sombra no chão */}
                                    <div className="w-16 h-4 bg-pastel-ink/20 rounded-[50%] mt-4 blur-[2px]"></div>
                                </div>
                            );
                        })}
                    </div>


                    {/* --- INTERFACE DE USUÁRIO (OVERLAYS FIXOS) --- */}

                    {/* CABEÇALHO CENTRALIZADO */}
                    <div className="absolute top-4 md:top-8 left-1/2 transform -translate-x-1/2 z-30 no-drag bg-white/95 backdrop-blur-md custom-border shadow-woodcut w-[90%] max-w-4xl p-5 md:p-8 text-center flex flex-col items-center max-h-[40vh] overflow-y-auto hide-scrollbar pointer-events-auto">
                        
                        {/* Informações Institucionais (UFBA) */}
                        <div className="font-sans text-[10px] md:text-xs font-bold text-pastel-ink/80 uppercase tracking-widest mb-3 md:mb-4 flex flex-wrap justify-center items-center gap-2">
                            <span>Universidade Federal da Bahia</span>
                            <span className="hidden md:inline">•</span>
                            <span>ARQC10 - Planejamento Urbano e Regional</span>
                        </div>
                        
                        {/* Títulos Principais */}
                        <h1 className="text-2xl md:text-4xl font-bold font-serif text-pastel-ink leading-tight mb-2">
                            Retratos do Saneamento Básico em Novorizonte - MG
                        </h1>
                        <h2 className="text-base md:text-xl font-serif text-pastel-ink/80 mb-5">
                            Diagnóstico, Desafios e Caminhos para a Universalização
                        </h2>
                        
                        {/* Texto de Apresentação e Linha Separadora */}
                        <div className="border-t-2 border-pastel-peach pt-4 md:pt-5 w-full">
                            <p className="text-xs md:text-sm font-sans text-pastel-text leading-relaxed mb-4 max-w-3xl mx-auto">
                                Trabalho desenvolvido no escopo da disciplina <strong>ARQC10 - Ateliê de Fundamentação de Planejamento Urbano e Regional</strong>. O objetivo deste material é investigar a realidade socioespacial e hídrica do município para desenvolver uma síntese interativa do diagnóstico técnico-participativo, servindo como base para a compreensão, estruturação e avaliação do Plano Municipal de Saneamento Básico (PMSB).
                            </p>
                            
                            {/* Créditos (Discente / Docente / Tag Parte 1) */}
                            <div className="flex flex-col md:flex-row items-center justify-center gap-2 md:gap-4 font-sans text-xs text-pastel-text">
                                <span><strong>Discente:</strong> Caio Aphonso Almeida</span>
                                <span className="hidden md:inline">&bull;</span>
                                <span><strong>Docente:</strong> Aline Barroso</span>
                                <div className="inline-block bg-pastel-sand px-3 py-1 custom-border text-pastel-ink font-bold uppercase mt-2 md:mt-0 shadow-woodcut-sm">
                                    Parte 1
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Dica de Navegação (Centro Inferior) */}
                    <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-30 no-drag bg-pastel-ink text-white px-6 py-3 rounded-full text-sm font-bold shadow-lg flex items-center gap-3 pointer-events-none opacity-80">
                        <IconCompass className="w-5 h-5" /> Arraste para explorar o mapa
                    </div>

                    {/* Controles de Zoom (Canto Inferior Direito) */}
                    <div className="absolute bottom-8 right-8 z-30 no-drag flex flex-col gap-2">
                        <button onClick={() => setZoom(z => Math.min(z + 0.2, 2.5))} className="w-12 h-12 bg-white custom-border shadow-woodcut-sm flex items-center justify-center hover:bg-pastel-sand active:translate-y-1"><IconZoomIn /></button>
                        <button onClick={() => setZoom(z => Math.max(z - 0.2, 0.4))} className="w-12 h-12 bg-white custom-border shadow-woodcut-sm flex items-center justify-center hover:bg-pastel-sand active:translate-y-1"><IconZoomOut /></button>
                        <button onClick={resetView} className="mt-2 text-xs font-bold uppercase bg-pastel-ink text-white py-2 px-2 custom-border hover:bg-black">Resetar</button>
                    </div>

                    {/* PAINEL LATERAL (Desliza da direita quando um pino é clicado) */}
                    <div className={`absolute top-0 right-0 h-full w-full md:w-[450px] lg:w-[500px] bg-pastel-bg custom-border border-r-0 shadow-[-10px_0_20px_rgba(0,0,0,0.1)] z-40 no-drag transition-transform duration-500 ease-in-out flex flex-col
                        ${activeNode ? 'translate-x-0' : 'translate-x-[110%]'}`}
                    >
                        {activeNodeData && (
                            <>
                                {/* Cabeçalho do Painel */}
                                <div className={`p-6 border-b-2 border-pastel-ink flex items-center justify-between shrink-0 ${activeNodeData.bg}`}>
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white p-2 custom-border"><activeNodeData.icon className="w-6 h-6 text-pastel-ink" /></div>
                                        <div>
                                            <div className="text-xs font-bold uppercase text-pastel-ink/70">{activeNodeData.title}</div>
                                            <h2 className="text-2xl font-bold font-serif text-pastel-ink">{activeNodeData.subtitle}</h2>
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveNode(null)} className="p-2 bg-white/50 hover:bg-white custom-border transition-colors"><IconX className="w-5 h-5"/></button>
                                </div>
                                
                                {/* Conteúdo Rolável do Painel */}
                                <div className="p-6 overflow-y-auto flex-1 map-texture">
                                    {activeNodeData.content}
                                </div>
                            </>
                        )}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
