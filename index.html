<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação: Saneamento Básico em Novorizonte - MG</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            bg: '#FDFBF7',
                            peach: '#E8C3B3',
                            blue: '#B9D2D0',
                            green: '#CDE0C0',
                            sand: '#F2E8D3',
                            ink: '#2B2624',
                            text: '#4A4440',
                            alert: '#D49A89',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    boxShadow: {
                        'woodcut': '6px 6px 0px 0px rgba(43, 38, 36, 1)',
                        'woodcut-sm': '3px 3px 0px 0px rgba(43, 38, 36, 1)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #2B2624; 
            margin: 0;
            padding: 20px 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .custom-border { border: 2.5px solid #2B2624; }
        
        .map-texture {
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
        }

        /* Configurações do Slide PPT (16:9) */
        .ppt-slide {
            width: 1280px;
            height: 720px;
            background-color: #FDFBF7;
            margin: 0 auto 30px auto;
            position: relative;
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            overflow: hidden;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Configurações de Impressão (Paisagem) */
        @media print {
            @page { size: 1280px 720px landscape; margin: 0; }
            body { 
                background-color: white; 
                margin: 0; 
                padding: 0; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                display: block;
            }
            .ppt-slide { 
                margin: 0; 
                box-shadow: none; 
                page-break-after: always;
                border: none;
                transform: scale(1);
            }
            .no-print { display: none !important; }
        }
        
        /* Ajuste de escala para visualizar em ecrãs menores */
        @media screen and (max-width: 1350px) {
            .ppt-slide {
                transform: scale(0.85);
                margin-bottom: -70px;
                transform-origin: top center;
            }
        }
        @media screen and (max-width: 1100px) {
            .ppt-slide {
                transform: scale(0.65);
                margin-bottom: -200px;
            }
        }
    </style>
</head>
<body>
    <div id="root" class="w-full flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconLeaf = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconSun = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const IconDroplets = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 6.3 7 6.3s-2.15 2.76-3.29 3.69C2.57 10.92 2 12.02 2 13.18 2 15.4 3.8 17.2 6 17.2"/><path d="m22 17.65-4-5.32-4 5.32c-.8.8-1.2 1.9-1.2 3.05 0 2.37 1.8 4.3 4 4.3 2.2 0 4-1.93 4-4.3 0-1.15-.4-2.25-1.2-3.05z"/></svg>;
        const IconMap = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconPieChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconRecycle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 15.3 3 11.3l4-4"/><path d="M3 11.3h11a5 5 0 0 1 5 5v1"/><path d="M17 8.7 21 12.7l-4 4"/><path d="M21 12.7H10a5 5 0 0 1-5-5V6"/></svg>;
        const IconImage = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;

        const MiniBar = ({ label, percent, valStr, colorClass = "bg-pastel-blue", width = "w-28" }) => (
            <div className="flex items-center text-xs font-sans font-bold text-pastel-ink uppercase tracking-wider mb-2">
                <span className={`${width} truncate shrink-0`}>{label}</span>
                <div className="flex-1 h-5 bg-pastel-sand/50 custom-border mx-3 overflow-hidden flex">
                    <div className={`h-full border-r-2 border-pastel-ink ${colorClass}`} style={{width: `${percent}%`}}></div>
                </div>
                <span className="w-16 text-right shrink-0">{valStr || `${percent}%`}</span>
            </div>
        );

        const HighlightBox = ({ title, value, subtitle, color = "bg-pastel-peach" }) => (
            <div className={`p-4 custom-border shadow-woodcut-sm flex flex-col justify-center items-center text-center ${color} h-full`}>
                <span className="text-[11px] font-bold uppercase tracking-widest text-pastel-ink/80 mb-1">{title}</span>
                <span className="text-4xl font-serif font-bold text-pastel-ink mb-1 leading-none">{value}</span>
                <span className="text-xs font-sans font-bold text-pastel-ink">{subtitle}</span>
            </div>
        );

        const InfoBlock = ({ title, value, subtitle, bgClass = 'bg-pastel-bg' }) => (
            <div className={`p-4 custom-border shadow-woodcut-sm flex flex-col justify-center items-center text-center ${bgClass} h-full`}>
                <span className="text-[11px] font-bold uppercase tracking-widest text-pastel-ink/60 mb-1">{title}</span>
                <span className="text-3xl font-serif font-bold text-pastel-ink mb-1 leading-none">{value}</span>
                <span className="text-xs font-sans font-bold text-pastel-ink">{subtitle}</span>
            </div>
        );

        const RaceChart = () => {
            const data = [
                { label: 'Parda', val: 3111, bg: 'bg-pastel-peach' },
                { label: 'Branca', val: 1238, bg: 'bg-pastel-sand' },
                { label: 'Preta', val: 210, bg: 'bg-pastel-blue' },
                { label: 'Indígena', val: 10, bg: 'bg-pastel-green' },
                { label: 'Amarela', val: 2, bg: 'bg-white' },
            ];
            return (
                <div className="space-y-2 mt-3">
                    {data.map(d => (
                        <div key={d.label} className="flex items-center text-xs font-sans font-bold text-pastel-ink uppercase tracking-wider">
                            <span className="w-24 truncate">{d.label}</span>
                            <div className="flex-1 h-4.5 bg-white custom-border mx-2 overflow-hidden flex">
                                <div className={`h-full border-r-2 border-pastel-ink ${d.bg}`} style={{width: `${(d.val/4571)*100}%`}}></div>
                            </div>
                            <span className="w-10 text-right">{d.val}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const PyramidChart = () => {
            const data = [
                { age: '60+', m: 18, f: 20 },
                { age: '40-59', m: 28, f: 30 },
                { age: '20-39', m: 34, f: 32 },
                { age: '0-19', m: 20, f: 18 },
            ];
            return (
                <div className="flex flex-col space-y-2 mt-3">
                    <div className="flex justify-between text-[11px] font-bold uppercase text-pastel-ink mb-1.5 px-1">
                        <span>Homens</span>
                        <span>Mulheres</span>
                    </div>
                    {data.map(d => (
                        <div key={d.age} className="flex items-center justify-center text-xs font-sans font-bold text-pastel-ink">
                            <div className="flex-1 flex justify-end">
                                <div className="h-4.5 bg-pastel-blue custom-border border-r-0" style={{width: `${d.m}%`}}></div>
                            </div>
                            <span className="w-14 text-center text-[11px] bg-white custom-border py-[1.5px] z-10">{d.age}</span>
                            <div className="flex-1 flex justify-start">
                                <div className="h-4.5 bg-pastel-peach custom-border border-l-0" style={{width: `${d.f}%`}}></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const StatCard = ({ title, value, subtitle, data, color, maxVal }) => {
            const max = maxVal || Math.max(...data);
            const width = 100;
            const height = 30;
            const points = data.map((d, i) => `${(i / (data.length - 1)) * width},${height - (d / max) * height}`).join(' ');

            return (
                <div className="p-4 border-2 border-pastel-ink bg-white shadow-woodcut flex flex-col justify-between h-full">
                    <div>
                        <h4 className="font-serif font-bold text-pastel-ink text-base leading-tight mb-1.5">{title}</h4>
                        <div className="text-3xl font-bold font-serif text-pastel-ink mb-2">{value}</div>
                    </div>
                    <div className="mt-auto w-full pt-2">
                        <svg viewBox={`-3 -3 ${width+6} ${height+6}`} className="w-full h-12 overflow-visible">
                            <polyline fill="none" stroke={color} strokeWidth="3" points={points} strokeLinejoin="round" strokeLinecap="round" />
                            <circle cx={(data.length - 1) / (data.length - 1) * width} cy={height - (data[data.length-1] / max) * height} r="4" fill={color} />
                        </svg>
                        <p className="text-[10px] uppercase font-bold text-pastel-text mt-4 text-center tracking-widest">{subtitle}</p>
                    </div>
                </div>
            );
        };

        const ImageSlide = ({ title, subtitle, imageUrl, page }) => (
            <section className="ppt-slide map-texture p-0 flex flex-col relative">
                <div className="w-full h-full bg-white flex flex-col p-10 relative overflow-hidden">
                    <header className="w-full border-b-2 border-pastel-ink pb-3 mb-6 shrink-0 text-left">
                        <span className="text-[11px] font-bold uppercase tracking-widest text-pastel-ink/60 block mb-1">Mapeamento e Cartografia</span>
                        <h3 className="text-3xl font-bold font-serif text-pastel-ink">{title}</h3>
                    </header>
                    <div className="flex-1 w-full relative custom-border bg-pastel-sand overflow-hidden flex items-center justify-center">
                        <img src={imageUrl} alt={title} className="w-full h-full object-cover" />
                    </div>
                    {subtitle && (
                        <p className="text-sm font-sans text-pastel-text mt-4 italic text-center w-full">{subtitle}</p>
                    )}
                </div>
                <div className="absolute bottom-5 right-8 text-sm font-bold font-sans text-pastel-ink/40 z-50">{page < 10 ? `0${page}` : page}</div>
            </section>
        );

        const PlaceholderSlide = ({ title, subtitle, page }) => (
            <section className="ppt-slide map-texture p-0 flex flex-col relative">
                <div className="w-full h-full bg-white flex flex-col p-10 relative overflow-hidden">
                    <header className="w-full border-b-2 border-pastel-ink pb-3 mb-6 shrink-0 text-left">
                        <span className="text-[11px] font-bold uppercase tracking-widest text-pastel-ink/60 block mb-1">Mapeamento e Cartografia</span>
                        <h3 className="text-3xl font-bold font-serif text-pastel-ink">{title}</h3>
                    </header>
                    <div className="flex-1 w-full relative custom-border bg-pastel-sand overflow-hidden flex flex-col items-center justify-center p-12 text-center">
                        <IconImage className="w-20 h-20 text-pastel-ink/40 mb-6" />
                        <h4 className="text-2xl font-bold font-serif text-pastel-ink mb-3">{subtitle}</h4>
                        <p className="text-base font-sans text-pastel-text max-w-xl">Esta página está reservada para a inserção de elementos cartográficos ou ilustrações adicionais do projeto.</p>
                    </div>
                </div>
                <div className="absolute bottom-5 right-8 text-sm font-bold font-sans text-pastel-ink/40 z-50">{page < 10 ? `0${page}` : page}</div>
            </section>
        );

        const App = () => {
            return (
                <div className="font-sans w-full max-w-[1280px]">
                    
                    <div className="fixed top-6 right-6 z-50 no-print">
                        <button 
                            onClick={() => window.print()}
                            className="bg-pastel-ink text-white text-base font-bold py-3 px-6 shadow-woodcut custom-border flex items-center gap-3 hover:bg-black transition-colors"
                        >
                            <IconPrinter className="w-5 h-5"/> Salvar Apresentação (PDF)
                        </button>
                    </div>

                    {/* SLIDE 01: CAPA */}
                    <section className="ppt-slide map-texture justify-center items-center text-center">
                        <div className="w-full h-full bg-white/95 p-12 custom-border shadow-woodcut flex flex-col justify-between items-center relative">
                            <div className="font-sans text-xs font-bold text-pastel-ink/80 uppercase tracking-widest flex items-center justify-center gap-3 border-b-2 border-pastel-peach pb-4 w-full">
                                <span>Universidade Federal da Bahia</span>
                                <span>•</span>
                                <span>ARQC10 - Planejamento Urbano e Regional</span>
                            </div>
                            <div className="flex flex-col items-center flex-1 justify-center my-6">
                                <div className="bg-pastel-sand rounded-full shadow-woodcut-sm custom-border flex items-center justify-center w-24 h-24 mb-6">
                                    <span className="text-5xl block mt-1.5">🐦</span>
                                </div>
                                <h1 className="text-6xl font-bold font-serif text-pastel-ink leading-tight mb-4">
                                    Retratos do Saneamento Básico
                                </h1>
                                <h2 className="text-3xl font-serif text-pastel-ink/80 italic mb-6">
                                    Novorizonte - Minas Gerais
                                </h2>
                                <p className="text-lg font-sans text-pastel-text leading-relaxed text-justify bg-pastel-bg p-6 custom-border shadow-woodcut-sm max-w-5xl">
                                    Trabalho desenvolvido no escopo da disciplina <strong>ARQC10</strong>. O objetivo deste material é mapear e analisar as ações já realizadas no âmbito do Plano Municipal de Saneamento Básico (PMSB) desde a sua implantação, visando compreender o seu nível de execução, avanços e lacunas ao longo do tempo.
                                </p>
                            </div>
                            <div className="flex w-full justify-between items-center text-lg font-sans text-pastel-ink bg-pastel-blue/20 p-5 custom-border border-l-8 border-l-pastel-blue text-left">
                                <span><strong>Discente:</strong> Caio Aphonso Almeida</span>
                                <span><strong>Docente:</strong> Aline Barroso</span>
                            </div>
                        </div>
                    </section>

                    {/* SLIDE 02 */}
                    <section className="ppt-slide map-texture">
                        <header className="border-b-4 border-pastel-ink pb-3 mb-6 flex justify-between items-end shrink-0">
                            <div>
                                <span className="text-sm font-bold uppercase tracking-widest text-pastel-ink/60 block mb-1">Capítulo 1</span>
                                <h2 className="text-3xl font-bold font-serif text-pastel-ink flex items-center gap-3">
                                    <IconMapPin className="w-8 h-8 text-pastel-blue"/> O Contexto: História
                                </h2>
                            </div>
                        </header>
                        <div className="flex-1 flex gap-8 min-h-0 items-stretch">
                            <div className="w-[50%] flex flex-col justify-center">
                                <div className="bg-white p-8 custom-border shadow-woodcut h-full flex flex-col justify-center">
                                    <h3 className="text-3xl font-bold font-serif text-pastel-ink mb-5 flex items-center gap-2 border-b-2 border-pastel-sand pb-3">
                                        <IconHistory className="w-7 h-7 text-pastel-peach"/> Resumo Histórico
                                    </h3>
                                    <div className="text-[17px] font-sans text-pastel-text leading-relaxed text-justify space-y-4">
                                        <p>A ocupação da região remonta ao século XVI com a expedição de Francisco Bruza de Spinosa (1553). Historicamente ligada a Salinas, a formação atual da cidade deve-se ao fazendeiro João Bernardino de Souza, no antigo povoado de Indaiá.</p>
                                        <p>Em 1953, João mobilizou a comunidade e conseguiu a doação de terras pelas famílias Almeida e Ferreira numa chapada chamada "Novo Indaiá", para construir uma praça e uma igreja em mutirão.</p>
                                        <p>Em outubro de 1953, o então presidente da câmara de Salinas visitou a chapada e declarou: <em>"isto aqui é muito bonito, é um horizonte"</em>. A inspiração gerou o nome "Novorizonte". A emancipação ocorreu em 1995.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="w-[50%] flex flex-col gap-5 h-full">
                                <div className="flex-[3] relative border-2 border-pastel-ink shadow-woodcut bg-pastel-sand overflow-hidden">
                                    <img src="https://i.postimg.cc/JhWqTh7r/IMG-20250819-WA0013.jpg" className="absolute inset-0 w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500"/>
                                </div>
                                <div className="flex-[2] flex gap-5 min-h-0">
                                    <div className="w-1/2 relative border-2 border-pastel-ink shadow-woodcut bg-pastel-sand overflow-hidden">
                                        <img src="https://i.postimg.cc/fbhKHbz1/IMG-20260113-WA0008.jpg" className="absolute inset-0 w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500"/>
