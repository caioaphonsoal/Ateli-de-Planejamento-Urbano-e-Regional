<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório: Saneamento Básico em Novorizonte - MG</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            bg: '#FDFBF7',
                            peach: '#E8C3B3',
                            blue: '#B9D2D0',
                            green: '#CDE0C0',
                            sand: '#F2E8D3',
                            ink: '#2B2624',
                            text: '#4A4440',
                            alert: '#D49A89',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    boxShadow: {
                        'woodcut': '4px 4px 0px 0px rgba(43, 38, 36, 1)',
                        'woodcut-sm': '2px 2px 0px 0px rgba(43, 38, 36, 1)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #e5e5e5;
            margin: 0;
            padding: 20px 0;
            font-family: 'Inter', sans-serif;
        }

        .custom-border { border: 2px solid #2B2624; }
        
        .map-texture {
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
        }

        /* Configurações da Página A4 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            background-color: #FDFBF7;
            margin: 0 auto 40px auto;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 15mm;
            display: flex;
            flex-direction: column;
        }

        /* Rodapé de página automático (via CSS) */
        .page-number::after {
            content: counter(page);
        }

        /* Configurações de Impressão */
        @media print {
            @page { size: A4; margin: 0; }
            body { 
                background-color: white; 
                margin: 0; 
                padding: 0; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .a4-page { 
                margin: 0; 
                box-shadow: none; 
                page-break-after: always;
                border: none;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Ícones ---
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconLeaf = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconSun = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const IconDroplets = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 6.3 7 6.3s-2.15 2.76-3.29 3.69C2.57 10.92 2 12.02 2 13.18 2 15.4 3.8 17.2 6 17.2"/><path d="m22 17.65-4-5.32-4 5.32c-.8.8-1.2 1.9-1.2 3.05 0 2.37 1.8 4.3 4 4.3 2.2 0 4-1.93 4-4.3 0-1.15-.4-2.25-1.2-3.05z"/></svg>;
        const IconMap = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconPieChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>

        // --- COMPONENTES AUXILIARES PARA GRÁFICOS ---
        const MiniBar = ({ label, percent, valStr, colorClass = "bg-pastel-blue", width = "w-16" }) => (
            <div className="flex items-center text-[10px] font-sans font-bold text-pastel-ink uppercase tracking-wider mb-1.5">
                <span className={`${width} truncate shrink-0`}>{label}</span>
                <div className="flex-1 h-3 bg-pastel-sand/50 custom-border mx-2 overflow-hidden flex">
                    <div className={`h-full border-r border-pastel-ink ${colorClass}`} style={{width: `${percent}%`}}></div>
                </div>
                <span className="w-12 text-right shrink-0">{valStr || `${percent}%`}</span>
            </div>
        );

        const HighlightBox = ({ title, value, subtitle, color = "bg-pastel-peach" }) => (
            <div className={`p-3 custom-border shadow-woodcut-sm flex flex-col justify-center items-center text-center ${color}`}>
                <span className="text-[9px] font-bold uppercase tracking-wider text-pastel-ink/80 mb-1">{title}</span>
                <span className="text-2xl font-serif font-bold text-pastel-ink mb-1 leading-none">{value}</span>
                <span className="text-[10px] font-sans font-bold text-pastel-ink">{subtitle}</span>
            </div>
        );

        const InfoBlock = ({ title, value, subtitle, bgClass = 'bg-pastel-bg' }) => (
            <div className={`p-3 custom-border shadow-woodcut-sm flex flex-col justify-center items-center text-center ${bgClass}`}>
                <span className="text-[9px] font-bold uppercase tracking-wider text-pastel-ink/60 mb-1">{title}</span>
                <span className="text-xl font-serif font-bold text-pastel-ink mb-1 leading-none">{value}</span>
                <span className="text-[10px] font-sans font-bold text-pastel-ink">{subtitle}</span>
            </div>
        );

        const RaceChart = () => {
            const data = [
                { label: 'Parda', val: 3111, bg: 'bg-pastel-peach' },
                { label: 'Branca', val: 1238, bg: 'bg-pastel-sand' },
                { label: 'Preta', val: 210, bg: 'bg-pastel-blue' },
                { label: 'Indígena', val: 10, bg: 'bg-pastel-green' },
                { label: 'Amarela', val: 2, bg: 'bg-white' },
            ];
            return (
                <div className="space-y-1.5 mt-2">
                    {data.map(d => (
                        <div key={d.label} className="flex items-center text-[10px] font-sans font-bold text-pastel-ink uppercase tracking-wider">
                            <span className="w-16 truncate">{d.label}</span>
                            <div className="flex-1 h-3 bg-white custom-border mx-2 overflow-hidden flex">
                                <div className={`h-full border-r border-pastel-ink ${d.bg}`} style={{width: `${(d.val/4571)*100}%`}}></div>
                            </div>
                            <span className="w-8 text-right">{d.val}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const PyramidChart = () => {
            const data = [
                { age: '60+', m: 18, f: 20 },
                { age: '40-59', m: 28, f: 30 },
                { age: '20-39', m: 34, f: 32 },
                { age: '0-19', m: 20, f: 18 },
            ];
            return (
                <div className="flex flex-col space-y-1.5 mt-2">
                    <div className="flex justify-between text-[9px] font-bold uppercase text-pastel-ink mb-1">
                        <span>Homens</span>
                        <span>Mulheres</span>
                    </div>
                    {data.map(d => (
                        <div key={d.age} className="flex items-center justify-center text-[10px] font-sans font-bold text-pastel-ink">
                            <div className="flex-1 flex justify-end">
                                <div className="h-3 bg-pastel-blue custom-border border-r-0" style={{width: `${d.m}%`}}></div>
                            </div>
                            <span className="w-12 text-center text-[9px] bg-white custom-border py-px z-10">{d.age}</span>
                            <div className="flex-1 flex justify-start">
                                <div className="h-3 bg-pastel-peach custom-border border-l-0" style={{width: `${d.f}%`}}></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const StatCard = ({ title, value, subtitle, data, color, maxVal }) => {
            const max = maxVal || Math.max(...data);
            const width = 100;
            const height = 25;
            const points = data.map((d, i) => `${(i / (data.length - 1)) * width},${height - (d / max) * height}`).join(' ');

            return (
                <div className="p-3 border-2 border-pastel-ink bg-white shadow-woodcut-sm flex flex-col justify-between h-full">
                    <h4 className="font-serif font-bold text-pastel-ink text-xs leading-tight mb-1">{title}</h4>
                    <div className="text-2xl font-bold font-serif text-pastel-ink mb-2">{value}</div>
                    <div className="mt-auto">
                        <svg viewBox={`-3 -3 ${width+6} ${height+6}`} className="w-full h-6 overflow-visible">
                            <polyline fill="none" stroke={color} strokeWidth="2.5" points={points} strokeLinejoin="round" strokeLinecap="round" />
                            <circle cx={(data.length - 1) / (data.length - 1) * width} cy={height - (data[data.length-1] / max) * height} r="3" fill={color} />
                        </svg>
                        <p className="text-[8px] uppercase font-bold text-pastel-text mt-2 text-center tracking-wider">{subtitle}</p>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL (LIVRO) ---
        const App = () => {
            return (
                <div className="font-sans">
                    
                    {/* Botão de Impressão (Não aparece no PDF) */}
                    <div className="fixed top-4 right-4 z-50 no-print">
                        <button 
                            onClick={() => window.print()}
                            className="bg-pastel-ink text-white font-bold py-3 px-6 shadow-woodcut custom-border flex items-center gap-2 hover:bg-black transition-colors"
                        >
                            <IconPrinter /> Salvar em PDF
                        </button>
                    </div>

                    {/* ========================================================= */}
                    {/* PÁGINA 1: CAPA */}
                    {/* ========================================================= */}
                    <section className="a4-page map-texture justify-center items-center text-center">
                        <div className="w-full max-w-2xl bg-white/90 p-12 custom-border shadow-woodcut flex flex-col items-center">
                            
                            <div className="font-sans text-xs font-bold text-pastel-ink/80 uppercase tracking-widest mb-6 flex flex-col items-center gap-1 border-b-2 border-pastel-peach pb-4 w-full">
                                <span>Universidade Federal da Bahia</span>
                                <span>ARQC10 - Planejamento Urbano e Regional</span>
                            </div>

                            <div className="bg-pastel-sand rounded-full shadow-woodcut-sm custom-border flex items-center justify-center w-20 h-20 mb-8">
                                <span className="text-4xl block mt-1">🐦</span>
                            </div>
                            
                            <h1 className="text-5xl font-bold font-serif text-pastel-ink leading-tight mb-4">
                                Retratos do Saneamento Básico
                            </h1>
                            <h2 className="text-2xl font-serif text-pastel-ink/80 mb-10 italic">
                                Novorizonte - Minas Gerais
                            </h2>
                            
                            <p className="text-sm font-sans text-pastel-text leading-relaxed mb-10 text-justify bg-pastel-bg p-6 custom-border">
                                Trabalho desenvolvido no escopo da disciplina <strong>ARQC10 - Ateliê de Fundamentação de Planejamento Urbano e Regional</strong>. O objetivo deste material é mapear e analisar as ações já realizadas no âmbito do Plano Municipal de Saneamento Básico (PMSB) desde sua implantação, visando compreender seu nível de execução, avanços e lacunas ao longo do tempo.
                            </p>
                            
                            <div className="flex flex-col w-full text-sm font-sans text-pastel-ink bg-pastel-blue/20 p-4 custom-border border-l-4 border-l-pastel-blue text-left">
                                <span className="mb-2"><strong>Discente:</strong> Caio Aphonso Almeida</span>
                                <span><strong>Docente:</strong> Aline Barroso</span>
                            </div>
                        </div>
                    </section>


                    {/* ========================================================= */}
                    {/* PÁGINA 2: O CONTEXTO (História e Geografia) */}
                    {/* ========================================================= */}
                    <section className="a4-page map-texture">
                        <header className="border-b-4 border-pastel-ink pb-4 mb-6 flex justify-between items-end">
                            <div>
                                <span className="text-xs font-bold uppercase tracking-widest text-pastel-ink/60 block mb-1">Capítulo 1</span>
                                <h2 className="text-3xl font-bold font-serif text-pastel-ink flex items-center gap-3">
                                    <IconMapPin className="w-8 h-8 text-pastel-blue"/> O Contexto: Território
                                </h2>
                            </div>
                        </header>

                        <div className="flex-1 flex flex-col gap-6">
                            
                            {/* HISTÓRIA */}
                            <div className="bg-white p-6 custom-border shadow-woodcut-sm">
                                <h3 className="text-xl font-bold font-serif text-pastel-ink mb-4 flex items-center gap-2 border-b-2 border-pastel-sand pb-2">
                                    <IconHistory className="text-pastel-peach"/> Resumo Histórico
                                </h3>
                                <div className="text-sm font-sans text-pastel-text leading-relaxed columns-2 gap-6 text-justify">
                                    <p className="mb-3">A ocupação da região remonta ao século XVI com a expedição de Francisco Bruza de Spinosa (1553). Historicamente ligada a Salinas, a formação atual da cidade deve-se muito ao fazendeiro João Bernardino de Souza (João Davilino), proprietário da Fazenda Córrego da Xícara no antigo povoado de Indaiá.</p>
                                    <p className="mb-3">Homem popular e trabalhador, João Bernardino atuou como Inspetor de Quarteirão e Inspetor da Escola Municipal. Em 1953, mobilizou a comunidade e conseguiu a doação de terras pelas famílias Almeida e Ferreira em uma chapada chamada "Novo Indaiá". O objetivo era construir uma praça e uma igreja dedicada a Nossa Senhora da Conceição, obra erguida em mutirão pelas famílias locais.</p>
                                    <p>Em 06 de outubro de 1953, o então prefeito de Salinas, Dr. Costa, ao visitar o Novo Indaiá, admirou a vista da chapada e declarou a João Bernardino: <em>"isto aqui é muito bonito, é um horizonte"</em>. A inspiração gerou o nome "Novorizonte", que foi prontamente aceito por todos. A emancipação ocorreu em 1995.</p>
                                </div>
                                {/* Galeria História */}
                                <div className="grid grid-cols-3 gap-3 mt-4">
                                    <img src="https://i.postimg.cc/JhWqTh7r/IMG-20250819-WA0013.jpg" className="w-full h-32 object-cover custom-border shadow-sm grayscale hover:grayscale-0 transition-all"/>
                                    <img src="https://i.postimg.cc/fbhKHbz1/IMG-20260113-WA0008.jpg" className="w-full h-32 object-cover custom-border shadow-sm grayscale hover:grayscale-0 transition-all"/>
                                    <img src="https://i.postimg.cc/yY5xHdLj/imagem.jpg" className="w-full h-32 object-cover custom-border shadow-sm grayscale hover:grayscale-0 transition-all"/>
                                </div>
                            </div>

                            {/* GEOGRAFIA */}
                            <div className="bg-white p-6 custom-border shadow-woodcut-sm flex-1">
                                <h3 className="text-xl font-bold font-serif text-pastel-ink mb-4 flex items-center gap-2 border-b-2 border-pastel-sand pb-2">
                                    <IconLeaf className="text-pastel-green"/> Geografia e Clima
                                </h3>
                                <p className="text-sm font-sans text-pastel-text leading-relaxed mb-4">
                                    Novorizonte possui uma dinâmica geográfica rica e desafiadora, marcada pela sua localização estratégica e características climáticas marcantes do semiárido.
                                </p>
                                
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <div className="p-3 custom-border bg-pastel-green/40 flex items-start gap-3">
                                        <div className="bg-pastel-green custom-border p-1.5 shrink-0"><IconMap /></div>
                                        <div>
                                            <h4 className="font-bold text-pastel-ink font-serif text-sm mb-1">Bioma e Relevo</h4>
                                            <p className="text-xs font-sans text-pastel-text">Planalto em área de transição entre o Cerrado e a Mata Atlântica.</p>
                                        </div>
                                    </div>
                                    <div className="p-3 custom-border bg-pastel-peach/40 flex items-start gap-3">
                                        <div className="bg-pastel-peach custom-border p-1.5 shrink-0"><IconSun /></div>
                                        <div>
                                            <h4 className="font-bold text-pastel-ink font-serif text-sm mb-1">Clima</h4>
                                            <p className="text-xs font-sans text-pastel-text">Semiárido brasileiro, impondo desafios com longos períodos de seca.</p>
                                        </div>
                                    </div>
                                    <div className="p-3 custom-border bg-pastel-blue/40 flex items-start gap-3">
                                        <div className="bg-pastel-blue custom-border p-1.5 shrink-0"><IconDroplets /></div>
                                        <div>
                                            <h4 className="font-bold text-pastel-ink font-serif text-sm mb-1">Recursos Hídricos</h4>
                                            <p className="text-xs font-sans text-pastel-text">Forte dependência de poços e barragens para abastecimento.</p>
                                        </div>
                                    </div>
                                    <div className="p-3 custom-border bg-pastel-sand flex items-start gap-3">
                                        <div className="bg-white custom-border p-1.5 shrink-0"><IconTarget /></div>
                                        <div>
                                            <h4 className="font-bold text-pastel-ink font-serif text-sm mb-1">Destaque Local</h4>
                                            <p className="text-xs font-sans text-pastel-text">Tradição na produção de cachaças artesanais de qualidade.</p>
                                        </div>
                                    </div>
                                </div>
                                {/* Galeria Geografia */}
                                <div className="grid grid-cols-2 gap-3 mt-auto">
                                    <img src="https://i.postimg.cc/s2Rcn2fR/IMG-20180421-103542037.jpg" className="w-full h-32 object-cover custom-border shadow-sm grayscale hover:grayscale-0 transition-all"/>
                                    <img src="https://i.postimg.cc/TPX9kP2x/IMG-20250809-151736639.jpg" className="w-full h-32 object-cover custom-border shadow-sm grayscale hover:grayscale-0 transition-all"/>
                                </div>
                            </div>
                        </div>
                    </section>


                    {/* ========================================================= */}
                    {/* PÁGINA 3: O CONTEXTO (Demografia e Economia) */}
                    {/* ========================================================= */}
                    <section className="a4-page map-texture">
                        <header className="border-b-4 border-pastel-ink pb-4 mb-6">
                            <h2 className="text-2xl font-bold font-serif text-pastel-ink flex items-center gap-3">
                                <IconUsers className="text-pastel-peach"/> Demografia e Economia

                                <p className="text-xs text-pastel-text font-sans mb-4">Apesar do PMSB prever a leitura comunitária como pilar central, os dados provam uma discrepância drástica entre a teoria do documento e a prática no município.</p>
