<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação: Saneamento Básico em Novorizonte - MG</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            bg: '#FDFBF7',
                            peach: '#E8C3B3',
                            blue: '#B9D2D0',
                            green: '#CDE0C0',
                            sand: '#F2E8D3',
                            ink: '#2B2624',
                            text: '#4A4440',
                            alert: '#D49A89',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    boxShadow: {
                        'woodcut': '4px 4px 0px 0px rgba(43, 38, 36, 1)',
                        'woodcut-sm': '2px 2px 0px 0px rgba(43, 38, 36, 1)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #2B2624; 
            margin: 0;
            padding: 40px 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .custom-border { border: 2px solid #2B2624; }
        
        .map-texture {
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
        }

        /* Configurações do Slide PPT (16:9) */
        .ppt-slide {
            width: 1280px;
            height: 720px;
            background-color: #FDFBF7;
            margin: 0 auto 40px auto;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
            /* Padding reduzido verticalmente para dar mais espaço ao conteúdo */
            padding: 30px 50px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Configurações de Impressão (Paisagem) */
        @media print {
            @page { size: 1280px 720px landscape; margin: 0; }
            body { 
                background-color: white; 
                margin: 0; 
                padding: 0; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                display: block;
            }
            .ppt-slide { 
                margin: 0; 
                box-shadow: none; 
                page-break-after: always;
                border: none;
                transform: scale(1);
            }
            .no-print { display: none !important; }
        }
        
        /* Ajuste de escala para visualizar telas menores */
        @media screen and (max-width: 1350px) {
            .ppt-slide {
                transform: scale(0.8);
                margin-bottom: -100px;
                transform-origin: top center;
            }
        }
        @media screen and (max-width: 1050px) {
            .ppt-slide {
                transform: scale(0.6);
                margin-bottom: -250px;
            }
        }
    </style>
</head>
<body>
    <div id="root" class="w-full flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconLeaf = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconSun = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const IconDroplets = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 6.3 7 6.3s-2.15 2.76-3.29 3.69C2.57 10.92 2 12.02 2 13.18 2 15.4 3.8 17.2 6 17.2"/><path d="m22 17.65-4-5.32-4 5.32c-.8.8-1.2 1.9-1.2 3.05 0 2.37 1.8 4.3 4 4.3 2.2 0 4-1.93 4-4.3 0-1.15-.4-2.25-1.2-3.05z"/></svg>;
        const IconMap = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconPieChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconRecycle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 15.3 3 11.4 7 7.6"/><path d="M19.5 16a9 9 0 0 1-15-4.6"/><path d="M17 8.7l4 3.9-4 3.8"/><path d="M4.5 8a9 9 0 0 1 15 4.6"/></svg>;

        const MiniBar = ({ label, percent, valStr, colorClass = "bg-pastel-blue", width = "w-24" }) => (
            <div className="flex items-center text-[11px] font-sans font-bold text-pastel-ink uppercase tracking-wider mb-1.5">
                <span className={`${width} truncate shrink-0`}>{label}</span>
                <div className="flex-1 h-3.5 bg-pastel-sand/50 custom-border mx-2 overflow-hidden flex">
                    <div className={`h-full border-r-2 border-pastel-ink ${colorClass}`} style={{width: `${percent}%`}}></div>
                </div>
                <span className="w-12 text-right shrink-0">{valStr || `${percent}%`}</span>
            </div>
        );

        const HighlightBox = ({ title, value, subtitle, color = "bg-pastel-peach" }) => (
            <div className={`p-3 custom-border shadow-woodcut-sm flex flex-col justify-center items-center text-center ${color} h-full`}>
                <span className="text-[10px] font-bold uppercase tracking-wider text-pastel-ink/80 mb-1">{title}</span>
                <span className="text-3xl font-serif font-bold text-pastel-ink mb-1 leading-none">{value}</span>
                <span className="text-xs font-sans font-bold text-pastel-ink">{subtitle}</span>
            </div>
        );

        const InfoBlock = ({ title, value, subtitle, bgClass = 'bg-pastel-bg' }) => (
            <div className={`p-3 custom-border shadow-woodcut-sm flex flex-col justify-center items-center text-center ${bgClass} h-full`}>
                <span className="text-[10px] font-bold uppercase tracking-wider text-pastel-ink/60 mb-1">{title}</span>
                <span className="text-2xl font-serif font-bold text-pastel-ink mb-1 leading-none">{value}</span>
                <span className="text-xs font-sans font-bold text-pastel-ink">{subtitle}</span>
            </div>
        );

        const RaceChart = () => {
            const data = [
                { label: 'Parda', val: 3111, bg: 'bg-pastel-peach' },
                { label: 'Branca', val: 1238, bg: 'bg-pastel-sand' },
                { label: 'Preta', val: 210, bg: 'bg-pastel-blue' },
                { label: 'Indígena', val: 10, bg: 'bg-pastel-green' },
                { label: 'Amarela', val: 2, bg: 'bg-white' },
            ];
            return (
                <div className="space-y-1.5 mt-2">
                    {data.map(d => (
                        <div key={d.label} className="flex items-center text-[11px] font-sans font-bold text-pastel-ink uppercase tracking-wider">
                            <span className="w-20 truncate">{d.label}</span>
                            <div className="flex-1 h-3.5 bg-white custom-border mx-2 overflow-hidden flex">
                                <div className={`h-full border-r-2 border-pastel-ink ${d.bg}`} style={{width: `${(d.val/4571)*100}%`}}></div>
                            </div>
                            <span className="w-8 text-right">{d.val}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const PyramidChart = () => {
            const data = [
                { age: '60+', m: 18, f: 20 },
                { age: '40-59', m: 28, f: 30 },
                { age: '20-39', m: 34, f: 32 },
                { age: '0-19', m: 20, f: 18 },
            ];
            return (
                <div className="flex flex-col space-y-1.5 mt-2">
                    <div className="flex justify-between text-[10px] font-bold uppercase text-pastel-ink mb-1">
                        <span>Homens</span>
                        <span>Mulheres</span>
                    </div>
                    {data.map(d => (
                        <div key={d.age} className="flex items-center justify-center text-[11px] font-sans font-bold text-pastel-ink">
                            <div className="flex-1 flex justify-end">
                                <div className="h-3.5 bg-pastel-blue custom-border border-r-0" style={{width: `${d.m}%`}}></div>
                            </div>
                            <span className="w-12 text-center text-[10px] bg-white custom-border py-[1px] z-10">{d.age}</span>
                            <div className="flex-1 flex justify-start">
                                <div className="h-3.5 bg-pastel-peach custom-border border-l-0" style={{width: `${d.f}%`}}></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const StatCard = ({ title, value, subtitle, data, color, maxVal }) => {
            const max = maxVal || Math.max(...data);
            const width = 100;
            const height = 25;
            const points = data.map((d, i) => `${(i / (data.length - 1)) * width},${height - (d / max) * height}`).join(' ');

            return (
                <div className="p-3 border-2 border-pastel-ink bg-white shadow-woodcut-sm flex flex-col justify-between h-full">
                    <h4 className="font-serif font-bold text-pastel-ink text-sm leading-tight mb-1">{title}</h4>
                    <div className="text-2xl font-bold font-serif text-pastel-ink mb-2">{value}</div>
                    <div className="mt-auto">
                        <svg viewBox={`-3 -3 ${width+6} ${height+6}`} className="w-full h-8 overflow-visible">
                            <polyline fill="none" stroke={color} strokeWidth="2.5" points={points} strokeLinejoin="round" strokeLinecap="round" />
                            <circle cx={(data.length - 1) / (data.length - 1) * width} cy={height - (data[data.length-1] / max) * height} r="3" fill={color} />
                        </svg>
                        <p className="text-[9px] uppercase font-bold text-pastel-text mt-3 text-center tracking-wider">{subtitle}</p>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="font-sans w-full max-w-[1280px]">
                    
                    {/* Botão de Impressão (Não aparece no PDF) */}
                    <div className="fixed top-6 right-6 z-50 no-print">
                        <button 
                            onClick={() => window.print()}
                            className="bg-pastel-ink text-white text-base font-bold py-3 px-6 shadow-woodcut custom-border flex items-center gap-3 hover:bg-black transition-colors"
                        >
                            <IconPrinter className="w-5 h-5"/> Salvar Apresentação (PDF)
                        </button>
                    </div>

                    {/* ========================================================= */}
                    {/* SLIDE CAPA: INFORMAÇÕES BÁSICAS */}
                    {/* ========================================================= */}
                    <section className="ppt-slide map-texture justify-center items-center text-center">
                        <div className="w-full max-w-4xl bg-white/95 p-12 custom-border shadow-woodcut flex flex-col items-center relative overflow-hidden">
                            
                            {/* Borda decorativa de fundo */}
                            <div className="absolute inset-2 border-2 border-pastel-ink/10 pointer-events-none"></div>

                            <div className="font-sans text-sm font-bold text-pastel-ink/80 uppercase tracking-widest mb-8 flex flex-col items-center gap-2 border-b-2 border-pastel-peach pb-6 w-full relative z-10">
                                <span>Universidade Federal da Bahia</span>
                                <span>ARQC10 - Ateliê de Fundamentação de Planejamento Urbano e Regional</span>
                            </div>
                            
                            <div className="bg-pastel-sand rounded-full shadow-woodcut-sm custom-border flex items-center justify-center w-24 h-24 mb-8 relative z-10">
                                <span className="text-5xl block mt-2">🐦</span>
                            </div>
                            
                            <h1 className="text-5xl font-bold font-serif text-pastel-ink leading-tight mb-4 relative z-10">
                                Retratos do Saneamento Básico
                            </h1>
                            <h2 className="text-2xl font-serif text-pastel-ink/80 mb-10 italic relative z-10">
                                Novorizonte - Minas Gerais
                            </h2>
                            
                            <div className="bg-pastel-blue/20 p-5 custom-border border-l-8 border-l-pastel-blue mb-10 w-full text-center shadow-woodcut-sm relative z-10">
                                <h3 className="font-bold font-sans text-pastel-ink text-xl uppercase tracking-wider">Etapa 4: Proposições Práticas</h3>
                                <p className="text-base font-serif italic text-pastel-text mt-2">O Problema, as Diretrizes, as Ações e os Instrumentos Urbanísticos</p>
                            </div>
                            
                            <div className="flex flex-row gap-16 w-full justify-center text-base font-sans text-pastel-ink relative z-10">
                                <span className="flex flex-col"><span className="text-[11px] text-pastel-ink/60 uppercase font-bold tracking-wider mb-1">Discente</span><strong>Caio Aphonso Almeida</strong></span>
                                <span className="flex flex-col"><span className="text-[11px] text-pastel-ink/60 uppercase font-bold tracking-wider mb-1">Docente</span><strong>Aline Barroso</strong></span>
                            </div>
                        </div>
                    </section>

                    {/* ========================================================= */}
                    {/* SLIDE: SÍNTESE DO PROBLEMA */}
                    {/* ========================================================= */}
                    <section className="ppt-slide map-texture">
                        <header className="border-b-4 border-pastel-ink pb-3 mb-6 flex justify-between items-end shrink-0">
                            <div>
                                <span className="text-sm font-bold uppercase tracking-widest text-pastel-ink/60 block mb-1">Introdução</span>
                                <h2 className="text-3xl font-bold font-serif text-pastel-ink flex items-center gap-3">
                                    <IconAlertCircle className="w-8 h-8 text-pastel-alert"/> A Síntese do Problema: Resíduos Sólidos
                                </h2>
                            </div>
                        </header>

                        <div className="flex-1 flex flex-col justify-center max-w-5xl mx-auto gap-4 w-full">
                            
                            <div className="bg-white p-5 custom-border shadow-woodcut flex gap-5 items-center">
                                <div className="w-14 h-14 shrink-0 bg-pastel-alert/20 border-2 border-pastel-alert flex items-center justify-center text-3xl font-bold font-serif text-pastel-alert">1</div>
                                <div>
                                    <h3 className="text-xl font-bold font-serif text-pastel-ink mb-2">Descarte Irregular por Falta de Adaptação</h3>
                                    <p className="text-sm font-sans text-pastel-text leading-relaxed text-justify">A coleta convencional com caminhões grandes não consegue acessar as áreas mais acidentadas, ruas de terra e becos de Novorizonte. Sem rotas alternativas, a população fica sem opção e acaba forçada a recorrer ao descarte irregular nas ruas ou terrenos, gerando acúmulo crônico e riscos à saúde pública.</p>
                                </div>
                            </div>

                            <div className="bg-white p-5 custom-border shadow-woodcut flex gap-5 items-center">
                                <div className="w-14 h-14 shrink-0 bg-pastel-alert/20 border-2 border-pastel-alert flex items-center justify-center text-3xl font-bold font-serif text-pastel-alert">2</div>
                                <div>
                                    <h3 className="text-xl font-bold font-serif text-pastel-ink mb-2">A Coleta Excludente</h3>
                                    <p className="text-sm font-sans text-pastel-text leading-relaxed text-justify">O modelo de gestão atual ignora completamente as dinâmicas da comunidade. O planejamento do Plano Municipal (PMSB) foi elaborado de cima para baixo, sem ouvir a população (100% não participou das decisões). Isso invisibiliza os problemas reais e marginaliza as pessoas que já trabalham informalmente com o lixo.</p>
                                </div>
                            </div>

                            <div className="bg-white p-5 custom-border shadow-woodcut flex gap-5 items-center">
                                <div className="w-14 h-14 shrink-0 bg-pastel-alert/20 border-2 border-pastel-alert flex items-center justify-center text-3xl font-bold font-serif text-pastel-alert">3</div>
                                <div>
                                    <h3 className="text-xl font-bold font-serif text-pastel-ink mb-2">Desperdício e Ausência de Reaproveitamento</h3>
                                    <p className="text-sm font-sans text-pastel-text leading-relaxed text-justify">A gestão de resíduos funciona de forma estritamente linear (coletar e afastar/enterrar). Metade do resíduo domiciliar é orgânico e uma grande parcela é reciclável (seco). Ao tratar tudo como "lixo" misturado, o município perde uma oportunidade imensa de gerar renda local e produzir adubo para os quintais.</p>
                                </div>
                            </div>
                            
                            {/* Pergunta norteadora / Gancho para as diretrizes */}
                            <div className="bg-pastel-ink p-5 custom-border shadow-woodcut text-center mt-2">
                                <p className="text-lg font-serif font-bold text-pastel-sand italic">
                                    "Como transformar o lixo — atualmente um problema crônico de saúde pública e exclusão — em um recurso de geração de renda, inclusão social e sustentabilidade para Novorizonte?"
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* ========================================================= */}
                    {/* SLIDE 11: CAPÍTULO 4 - DIRETRIZES */}
                    {/* ========================================================= */}
                    <section className="ppt-slide map-texture">
                        <header className="border-b-4 border-pastel-ink pb-3 mb-4 flex justify-between items-end shrink-0">
                            <div>
                                <span className="text-sm font-bold uppercase tracking-widest text-pastel-ink/60 block mb-1">Capítulo 4</span>
                                <h2 className="text-3xl font-bold font-serif text-pastel-ink flex items-center gap-3">
                                    <IconRecycle className="w-8 h-8 text-pastel-green"/> Diretrizes
                                </h2>
                            </div>
                        </header>

                        {/* Flex-1 centralizando os quadros, com largura máxima definida para não esticar muito nas laterais */}
                        <div className="flex flex-col flex-1 justify-center min-h-0 w-full max-w-5xl mx-auto gap-4">
                            
                            <div className="bg-white p-5 custom-border shadow-woodcut flex gap-5 items-center group hover:bg-pastel-green/5 transition-colors">
                                <div className="w-14 h-14 shrink-0 bg-pastel-green custom-border shadow-woodcut-sm flex items-center justify-center text-2xl font-bold font-serif text-pastel-ink">1</div>
                                <div>

                                <div className="w-14 h-14 shrink-0 bg-pastel-blue custom-border shadow-woodcut-sm flex items-center justify-center text-2xl font-bold font-serif text-pastel-ink">1</div>
                                <div>
                                    <h3 className="text-xl font-bold font-serif text-pastel-ink mb-2 border-b-2 border-pastel-blue pb-1 inline-block">Revisão do Plano Municipal de Saneamento Básico (PMSB)</h3>
                                    <p className="text-sm font-sans text-pastel-text leading-relaxed text-justify">
                                        Utilizar a lei para obrigar a prefeitura de Novorizonte a revisar o PMSB (já que 100% da população relatou que não foi ouvida antes). Essa revisão deve aprovar e institucionalizar as "rotas alternativas de coleta" criadas pelos moradores, transformando-as em serviço público oficial.
                                    </p>
                                </div>
                            </div>

                            <div className="bg-white p-5 custom-border shadow-woodcut flex gap-5 items-center group hover:bg-pastel-peach/5 transition-colors">
                                <div className="w-14 h-14 shrink-0 bg-pastel-peach custom-border shadow-woodcut-sm flex items-center justify-center text-2xl font-bold font-serif text-pastel-ink">2</div>
                                <div>
                                    <h3 className="text-xl font-bold font-serif text-pastel-ink mb-2 border-b-2 border-pastel-peach pb-1 inline-block">Concessão de Direito Real de Uso (CDRU) em ZEIS</h3>
                                    <p className="text-sm font-sans text-pastel-text leading-relaxed text-justify">
                                        A prefeitura cede formalmente um terreno público subutilizado de Novorizonte para a associação de moradores através da CDRU. Isso dá segurança jurídica para que o espaço comunitário pertença à população e não possa ser tomado de volta por gestões futuras.
                                    </p>
                                </div>
                            </div>

                            <div className="bg-white p-5 custom-border shadow-woodcut flex gap-5 items-center group hover:bg-pastel-green/5 transition-colors">
                                <div className="w-14 h-14 shrink-0 bg-pastel-green custom-border shadow-woodcut-sm flex items-center justify-center text-2xl font-bold font-serif text-pastel-ink">3</div>
                                <div>
                                    <h3 className="text-xl font-bold font-serif text-pastel-ink mb-2 border-b-2 border-pastel-green pb-1 inline-block">Pagamento por Serviços Ambientais (PSA) e Termo de Fomento</h3>
                                    <p className="text-sm font-sans text-pastel-text leading-relaxed text-justify">
                                        Estabelecer um contrato onde a prefeitura de Novorizonte destina verba pública especificamente para pagar os cursos de capacitação e, posteriormente, remunera a cooperativa local de acordo com o volume de lixo que eles conseguem separar e tratar, reconhecendo-os como agentes ambientais.
                                    </p>
                                </div>
                            </div>

                        </div>
                    </section>

                    {/* ========================================================= */}
                    {/* SLIDE 16: RODA DA GESTÃO DEMOCRÁTICA (MANDALA) */}
                    {/* ========================================================= */}
                    <section className="ppt-slide map-texture">
                        <header className="border-b-4 border-pastel-ink pb-3 mb-2 flex justify-between items-end shrink-0">
                            <div>
                                <span className="text-sm font-bold uppercase tracking-widest text-pastel-ink/60 block mb-1">Capítulo 4</span>
                                <h2 className="text-3xl font-bold font-serif text-pastel-ink flex items-center gap-3">
                                    <IconTarget className="w-8 h-8 text-pastel-alert"/> Roda da Gestão Democrática
                                </h2>
                            </div>
                        </header>

                        <div className="flex-1 flex flex-col justify-center items-center relative w-full mt-2">
                            
                            {/* Texto explicativo topo */}
                            <div className="bg-white p-3 custom-border shadow-woodcut-sm max-w-4xl mb-6 z-20 text-center relative">
                                <p className="text-sm font-sans text-pastel-text leading-relaxed">
                                    Um modelo institucional revisto para o PMSB: a decisão <strong>parte de dentro (a comunidade) para fora (o poder público)</strong>. As secretarias orbitam e servem à vontade popular da assembleia local, extinguindo o antigo modelo impositivo "top-down".
                                </p>
                            </div>

                            {/* Container do Diagrama */}
                            <div className="relative w-[1000px] h-[450px]">
                                
                                {/* SETAS SVG DE CONEXÃO (De dentro para fora) */}
                                <svg className="absolute inset-0 w-full h-full pointer-events-none z-0" viewBox="0 0 1000 450">
                                    <defs>
                                        <marker id="arrowhead-out" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
                                            <polygon points="0 0, 6 3, 0 6" fill="#4A4440"/>
                                        </marker>
                                    </defs>
                                    
                                    {/* Círculo base da Mandala */}
                                    <circle cx="500" cy="225" r="170" fill="none" stroke="#4A4440" strokeWidth="2" strokeDasharray="8 8" opacity="0.15" />
                                    
                                    {/* Linhas irradiando do centro (500, 225) */}
                                    {/* Top-Left */}
                                    <line x1="450" y1="195" x2="330" y2="120" stroke="#4A4440" strokeWidth="3" strokeDasharray="6 6" markerEnd="url(#arrowhead-out)" />
                                    {/* Top-Right */}
                                    <line x1="550" y1="195" x2="670" y2="120" stroke="#4A4440" strokeWidth="3" strokeDasharray="6 6" markerEnd="url(#arrowhead-out)" />
                                    {/* Bottom-Left */}
                                    <line x1="450" y1="255" x2="330" y2="330" stroke="#4A4440" strokeWidth="3" strokeDasharray="6 6" markerEnd="url(#arrowhead-out)" />
                                    {/* Bottom-Right */}
                                    <line x1="550" y1="255" x2="670" y2="330" stroke="#4A4440" strokeWidth="3" strokeDasharray="6 6" markerEnd="url(#arrowhead-out)" />
                                </svg>

                                {/* CENTRO: Assembleia de Moradores */}
                                <div className="absolute top-[225px] left-[500px] transform -translate-x-1/2 -translate-y-1/2 z-30 w-52 h-52 rounded-full bg-pastel-sand custom-border shadow-woodcut flex flex-col items-center justify-center text-center p-4 hover:scale-105 transition-transform">
                                    <IconUsers className="w-10 h-10 text-pastel-ink mb-2"/>
                                    <span className="font-serif font-bold text-pastel-ink leading-tight text-xl mb-1">Assembleia de<br/>Moradores</span>
                                    <span className="text-[10px] font-sans text-pastel-ink/80 font-bold uppercase tracking-widest border-t border-pastel-ink/20 pt-2 mt-1 w-3/4">Núcleo Decisório</span>
                                </div>

                                {/* NÓ 1: Top-Left (Obras) */}
                                <div className="absolute top-[80px] left-[220px] transform -translate-x-1/2 -translate-y-1/2 z-20 w-60 bg-white p-4 custom-border shadow-woodcut-sm flex flex-col items-center text-center hover:bg-pastel-blue/10 transition-colors">
                                    <div className="absolute -top-5 w-10 h-10 bg-pastel-blue custom-border rounded-full flex items-center justify-center shadow-woodcut-sm"><IconMap className="w-5 h-5 text-pastel-ink"/></div>
                                    <h4 className="font-bold font-serif text-pastel-ink text-sm mb-1 mt-2 border-b-2 border-pastel-blue pb-1 w-full">Secretaria de Obras</h4>
                                    <p className="text-[11px] font-sans text-pastel-text leading-tight mt-1">Executa rotas adaptadas de coleta e aprova o espaço da Estação.</p>
                                </div>

                                {/* NÓ 2: Top-Right (Meio Ambiente) */}
                                <div className="absolute top-[80px] left-[780px] transform -translate-x-1/2 -translate-y-1/2 z-20 w-60 bg-white p-4 custom-border shadow-woodcut-sm flex flex-col items-center text-center hover:bg-pastel-green/10 transition-colors">
                                    <div className="absolute -top-5 w-10 h-10 bg-pastel-green custom-border rounded-full flex items-center justify-center shadow-woodcut-sm"><IconLeaf className="w-5 h-5 text-pastel-ink"/></div>
                                    <h4 className="font-bold font-serif text-pastel-ink text-sm mb-1 mt-2 border-b-2 border-pastel-green pb-1 w-full">Sec. Meio Ambiente</h4>
                                    <p className="text-[11px] font-sans text-pastel-text leading-tight mt-1">Garante e fiscaliza o Pagamento por Serviços Ambientais (PSA).</p>
                                </div>

                                {/* NÓ 3: Bottom-Left (Educação/Saúde) */}
                                <div className="absolute top-[370px] left-[220px] transform -translate-x-1/2 -translate-y-1/2 z-20 w-60 bg-white p-4 custom-border shadow-woodcut-sm flex flex-col items-center text-center hover:bg-pastel-peach/10 transition-colors">
                                    <div className="absolute -top-5 w-10 h-10 bg-pastel-peach custom-border rounded-full flex items-center justify-center shadow-woodcut-sm"><IconBookOpen className="w-5 h-5 text-pastel-ink"/></div>
                                    <h4 className="font-bold font-serif text-pastel-ink text-sm mb-1 mt-2 border-b-2 border-pastel-peach pb-1 w-full">Sec. Saúde & Educação</h4>
                                    <p className="text-[11px] font-sans text-pastel-text leading-tight mt-1">Financia e certifica o "Canteiro-Escola" como ação em saúde.</p>
                                </div>

                                {/* NÓ 4: Bottom-Right (Câmara) */}
                                <div className="absolute top-[370px] left-[780px] transform -translate-x-1/2 -translate-y-1/2 z-20 w-60 bg-white p-4 custom-border shadow-woodcut-sm flex flex-col items-center text-center hover:bg-pastel-sand/80 transition-colors">
                                    <div className="absolute -top-5 w-10 h-10 bg-white custom-border rounded-full flex items-center justify-center shadow-woodcut-sm"><IconHistory className="w-5 h-5 text-pastel-ink"/></div>
                                    <h4 className="font-bold font-serif text-pastel-ink text-sm mb-1 mt-2 border-b-2 border-pastel-ink pb-1 w-full">Câmara Municipal</h4>
                                    <p className="text-[11px] font-sans text-pastel-text leading-tight mt-1">Aprova a CDRU do terreno e oficializa o PMSB revisado.</p>
                                </div>

                            </div>
                        </div>
                    </section>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
