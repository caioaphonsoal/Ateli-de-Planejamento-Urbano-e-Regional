<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interativo: Saneamento Básico em Novorizonte - MG</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            bg: '#FDFBF7',     /* Fundo principal areia claro */
                            peach: '#E8C3B3',  /* Pêssego pastel */
                            blue: '#B9D2D0',   /* Azul pastel */
                            green: '#CDE0C0',  /* Verde pastel */
                            sand: '#F2E8D3',   /* Areia */
                            ink: '#2B2624',    /* Tinta escura/Marrom */
                            text: '#4A4440',   /* Texto secundário */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    boxShadow: {
                        'woodcut': '6px 6px 0px 0px rgba(43, 38, 36, 1)',
                        'woodcut-sm': '4px 4px 0px 0px rgba(43, 38, 36, 1)',
                        'woodcut-lg': '12px 12px 0px 0px rgba(43, 38, 36, 1)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Desabilita o scroll nativo, pois o mapa é "arrastável" */
        body {
            background-color: #FDFBF7;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            touch-action: none; /* Previne comportamentos de scroll no mobile para focar no drag */
        }

        .map-texture {
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
        }

        /* Grade Cartográfica de fundo */
        .map-grid {
            background-image: 
                linear-gradient(rgba(43, 38, 36, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(43, 38, 36, 0.05) 2px, transparent 2px),
                linear-gradient(rgba(43, 38, 36, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(43, 38, 36, 0.02) 1px, transparent 1px);
            background-size: 200px 200px, 200px 200px, 40px 40px, 40px 40px;
            background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
        }

        .woodcut-bg {
            position: absolute;
            opacity: 0.25;
            pointer-events: none;
            mix-blend-mode: multiply;
            filter: grayscale(100%) contrast(1.2);
        }

        .custom-border { border: 2px solid #2B2624; }

        /* Cursores para o mapa */
        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing !important; }

        /* Scrollbar elegante */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(43, 38, 36, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background-color: rgba(43, 38, 36, 0.4); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animações da Janela Expansível */
        @keyframes expandIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-expand {
            animation: expandIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Ícones Inline SVG ---
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconChevronDown = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
        const IconCheckCircle2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconLeaf = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconZoomIn = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const IconZoomOut = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const IconCompass = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;

        // --- COMPONENTE SLIDESHOW ---
        const Slideshow = ({ images }) => {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => { setCurrentIndex(0); }, [images]);

            useEffect(() => {
                if (!images || images.length <= 1) return;
                const interval = setInterval(() => {
                    setCurrentIndex((prev) => (prev + 1) % images.length);
                }, 3500); 
                return () => clearInterval(interval);
            }, [images]);

            return (
                <div className="w-full h-64 md:h-96 lg:h-full custom-border shadow-woodcut-sm bg-pastel-sand overflow-hidden relative group flex items-center justify-center">
                    {images.map((img, index) => (
                        <img
                            key={index}
                            src={img}
                            alt={`Imagem ${index + 1}`}
                            className={`absolute inset-0 w-full h-full object-contain p-2 md:p-4 transition-opacity duration-1000 ease-in-out ${index === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}
                        />
                    ))}
                    {images.length > 1 && (
                        <div className="absolute bottom-3 md:bottom-5 left-0 right-0 flex justify-center gap-2 z-20">
                            {images.map((_, idx) => (
                                <button 
                                    key={idx} 
                                    onClick={() => setCurrentIndex(idx)}
                                    className={`w-2 h-2 rounded-full transition-all border border-pastel-ink/30 shadow-sm ${idx === currentIndex ? 'bg-pastel-ink w-5' : 'bg-pastel-ink/20 hover:bg-pastel-ink/50'}`} 
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // --- GRÁFICOS E CARTÕES ---
        const RaceChart = () => {
            const data = [
                { label: 'Parda', val: 3111, bg: 'bg-pastel-peach' },
                { label: 'Branca', val: 1238, bg: 'bg-pastel-sand' },
                { label: 'Preta', val: 210, bg: 'bg-pastel-blue' },
                { label: 'Indígena', val: 10, bg: 'bg-pastel-green' },
                { label: 'Amarela', val: 2, bg: 'bg-white' },
            ];
            return (
                <div className="space-y-2 mt-4">
                    {data.map(d => (
                        <div key={d.label} className="flex items-center text-xs font-sans font-bold text-pastel-ink uppercase tracking-wider">
                            <span className="w-20 truncate">{d.label}</span>
                            <div className="flex-1 h-4 bg-white custom-border mx-2 overflow-hidden flex">
                                <div className={`h-full border-r-2 border-pastel-ink ${d.bg}`} style={{width: `${(d.val/4571)*100}%`}}></div>
                            </div>
                            <span className="w-10 text-right">{d.val}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const PyramidChart = () => {
            const data = [
                { age: '60+', m: 18, f: 20 },
                { age: '40-59', m: 28, f: 30 },
                { age: '20-39', m: 34, f: 32 },
                { age: '0-19', m: 20, f: 18 },
            ];
            return (
                <div className="flex flex-col space-y-2 mt-4">
                    <div className="flex justify-between text-[10px] font-bold uppercase text-pastel-ink mb-1">
                        <span>Homens</span>
                        <span>Mulheres</span>
                    </div>
                    {data.map(d => (
                        <div key={d.age} className="flex items-center justify-center text-xs font-sans font-bold text-pastel-ink">
                            <div className="flex-1 flex justify-end">
                                <div className="h-4 bg-pastel-blue custom-border border-r-0" style={{width: `${d.m}%`}}></div>
                            </div>
                            <span className="w-14 text-center text-[10px] bg-white custom-border py-0.5 z-10">{d.age}</span>
                            <div className="flex-1 flex justify-start">
                                <div className="h-4 bg-pastel-peach custom-border border-l-0" style={{width: `${d.f}%`}}></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const StatCard = ({ title, value, subtitle, data, color, maxVal }) => {
            const max = maxVal || Math.max(...data);
            const width = 100;
            const height = 25;
            const points = data.map((d, i) => `${(i / (data.length - 1)) * width},${height - (d / max) * height}`).join(' ');

            return (
                <div className="p-4 border-2 border-pastel-ink bg-white shadow-woodcut-sm flex flex-col justify-between h-full">
                    <h4 className="font-serif font-bold text-pastel-ink text-sm leading-tight mb-2">{title}</h4>
                    <div className="text-3xl font-bold font-serif text-pastel-ink mb-2">{value}</div>
                    <div className="mt-auto">
                        <svg viewBox={`-3 -3 ${width+6} ${height+6}`} className="w-full h-8 overflow-visible">
                            <polyline fill="none" stroke={color} strokeWidth="2.5" points={points} strokeLinejoin="round" strokeLinecap="round" />
                            <circle cx={(data.length - 1) / (data.length - 1) * width} cy={height - (data[data.length-1] / max) * height} r="3" fill={color} />
                        </svg>
                        <p className="text-[9px] uppercase font-bold text-pastel-text mt-3 text-center tracking-wider">{subtitle}</p>
                    </div>
                </div>
            );
        };

        // --- CONTEÚDO DAS JANELAS ---
        
        // 1. Onde será avaliado?
        const OndeContent = () => {
            const [activeTab, setActiveTab] = useState('historia');
            
            const tabImages = {
                historia: ["https://i.postimg.cc/JhWqTh7r/IMG-20250819-WA0013.jpg", "https://i.postimg.cc/TPX9kP2x/IMG-20250809-151736639.jpg"],
                geografia: ["https://i.postimg.cc/s2Rcn2fR/IMG-20180421-103542037.jpg", "https://i.postimg.cc/8CVHyCpY/IMG-20260113-WA0006.jpg"],
                demografia: ["https://i.postimg.cc/jjrX8jx9/IMG-20250819-WA0014.jpg"],
                socioeconomico: ["https://i.postimg.cc/fbhKHbz1/IMG-20260113-WA0008.jpg"]
            };

            const tabs = {
                historia: { 
                    icon: <IconHistory/>, 
                    title: "História", 
                    content: (
                        <div className="space-y-4">
                            <p>A ocupação da região remonta ao século XVI com a expedição de Francisco Bruza de Spinosa (1553). Historicamente ligada a Salinas, a formação atual da cidade deve-se muito ao fazendeiro João Bernardino de Souza (João Davilino), proprietário da Fazenda Córrego da Xícara no antigo povoado de Indaiá.</p>
                            <p>Homem popular e trabalhador, João Bernardino atuou como Inspetor de Quarteirão e Inspetor da Escola Municipal. Em 1953, mobilizou a comunidade e conseguiu a doação de terras pelas famílias Almeida e Ferreira em uma chapada chamada "Novo Indaiá". O objetivo era construir uma praça e uma igreja dedicada a Nossa Senhora da Conceição, obra erguida em mutirão pelas famílias locais.</p>
                            <p>Em 06 de outubro de 1953, o então prefeito de Salinas, Dr. Costa, ao visitar o Novo Indaiá, admirou a vista da chapada e declarou a João Bernardino: <em>"isto aqui é muito bonito, é um horizonte"</em>. A inspiração gerou o nome "Novorizonte", que foi prontamente aceito por todos. A emancipação ocorreu em 1995.</p>
                        </div>
                    ) 
                },
                geografia: { 
                    icon: <IconLeaf/>, 
                    title: "Geografia", 
                    content: <p>Novorizonte é um município localizado em uma região de planalto, situado em área de transição entre o Cerrado e a Mata Atlântica. Pertence à região do semiárido brasileiro, o que torna a dinâmica climática (incluindo períodos de seca) e a infraestrutura hídrica (barragens) desafios cruciais. É reconhecido também pela produção de inúmeras cachaças.</p> 
                },
                demografia: { 
                    icon: <IconUsers/>, 
                    title: "Demografia", 
                    content: (
                        <div className="space-y-4">
                            <div className="flex flex-wrap gap-3 mb-4">
                                <span className="px-3 py-1 bg-pastel-sand custom-border text-xs font-bold text-pastel-ink uppercase">Gentílico: Novorizontino</span>
                                <span className="px-3 py-1 bg-pastel-sand custom-border text-xs font-bold text-pastel-ink uppercase">Aniversário: 21 de Dezembro</span>
                            </div>
                            <p>Segundo o <strong>Censo IBGE 2022</strong>, o município conta com uma população de <strong>4.571 habitantes</strong> e uma densidade demográfica de <strong>16,83 hab./km²</strong>. Historicamente, mantém-se o perfil de forte presença na área urbana (cerca de 83,1%), enquanto 16,9% residem na área rural. A idade mediana é de 37 anos.</p>
                            
                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4 mt-4">
                                <div className="p-4 border-2 border-pastel-ink bg-pastel-bg shadow-woodcut-sm">
                                    <h4 className="font-serif font-bold text-pastel-ink mb-2 border-b-2 border-pastel-ink pb-2">Cor ou Raça (2022)</h4>
                                    <RaceChart />
                                </div>
                                <div className="p-4 border-2 border-pastel-ink bg-pastel-bg shadow-woodcut-sm">
                                    <h4 className="font-serif font-bold text-pastel-ink mb-2 border-b-2 border-pastel-ink pb-2">Pirâmide Etária (2022)</h4>
                                    <PyramidChart />
                                </div>
                            </div>
                        </div>
                    ) 
                },
                socioeconomico: { 
                    icon: <IconTrendingUp/>, 
                    title: "Economia", 
                    content: (
                        <div className="space-y-6">
                            <p>Localizado na mesorregião do Norte de Minas (microrregião de Salinas) e pertencente à Bacia Hidrográfica do Rio Jequitinhonha. O território é formado pelos distritos Sede e Campo Verde de Minas, pelos povoados de Baixa da Cambaúba, Baixa do Bitu, Indaiá e São João do Pequi, pela comunidade de Alto São João e por 26 fazendas na área rural. Destaca-se a presença de povos tradicionais geraizeiros.</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <StatCard 
                                    title="PIB per Capita" 
                                    value="R$ 20.256" 
                                    subtitle="Crescimento (2012-2023)" 
                                    data={[5, 6, 7, 8, 10, 11, 13, 19, 20.2]} 
                                    color="#2B2624" 
                                />
                                <StatCard 
                                    title="Mortalidade Infantil" 
                                    value="0" 
                                    subtitle="Óbitos/mil nv (2008-2023)" 
                                    data={[10, 14, 14, 44, 28, 20, 32, 20, 14, 18, 21, 20, 0]} 
                                    color="#2B2624" 
                                    maxVal={50}
                                />
                                <StatCard 
                                    title="IDEB (Anos Finais)" 
                                    value="4,6" 
                                    subtitle="Rede Pública (2005-2023)" 
                                    data={[2, 3, 4, 4, 4, 4, 4, 4, 5, 4.6]} 
                                    color="#2B2624" 
                                    maxVal={6}
                                />
                            </div>
                        </div>
                    ) 
                }
            };

            return (
                <div className="flex flex-col lg:flex-row gap-6 h-full min-h-[500px]">
                    {/* Menu de Abas */}
                    <div className="flex lg:flex-col gap-3 overflow-x-auto pb-2 lg:pb-0 lg:w-1/4 xl:w-1/5 shrink-0 hide-scrollbar">
                        {Object.keys(tabs).map((key) => (
                            <button key={key} onClick={() => setActiveTab(key)} className={`flex items-center gap-3 px-4 py-3 text-left transition-all whitespace-nowrap lg:whitespace-normal font-sans font-bold custom-border ${activeTab === key ? 'bg-pastel-blue text-pastel-ink shadow-woodcut-sm lg:translate-x-2' : 'bg-white text-pastel-text hover:bg-pastel-sand'}`}>
                                <span className={activeTab === key ? 'text-pastel-ink' : 'text-pastel-text'}>{tabs[key].icon}</span>
                                <span>{tabs[key].title}</span>
                            </button>
                        ))}
                    </div>
                    
                    {/* Área de Conteúdo */}
                    <div className="flex-1 bg-white custom-border p-6 md:p-8 shadow-woodcut flex flex-col xl:flex-row gap-8 overflow-hidden">
                        <div className="flex-1 flex flex-col">
                            <h3 className="text-2xl font-bold font-serif text-pastel-ink mb-6 border-b-2 border-pastel-ink pb-3 flex items-center gap-3">
                                {tabs[activeTab].icon} {tabs[activeTab].title}
                            </h3>
                            <div className="text-pastel-text font-sans text-lg leading-relaxed flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                {tabs[activeTab].content}
                            </div>
                        </div>
                        {/* Slideshow */}
                        <div className="w-full xl:w-[45%] flex flex-col shrink-0 min-h-[300px]">
                            <Slideshow images={tabImages[activeTab]} />
                        </div>
                    </div>
                </div>
            );
        };

        // 2. Qual o problema?
        const ProblemaContent = () => {
            const [activeStep, setActiveStep] = useState(0);
            
            const steps = [
                { 
                    title: "Déficits nos Eixos do Saneamento", 
                    desc: "A ausência ou ineficiência na prestação de serviços adequados nos quatro eixos estruturais: abastecimento de água potável, esgotamento sanitário, limpeza urbana e manejo de resíduos sólidos, além da drenagem de águas pluviais. O cenário exige levantamentos para dimensionar a demanda de infraestrutura, especialmente nas áreas rurais e povoados.",
                    ref: "Produto D - Prognóstico do Saneamento Básico; Resumo Executivo - Produtos A a F."
                },
                { 
                    title: "Exclusão Histórica e Universalização", 
                    desc: "A necessidade imperativa de garantir que o saneamento alcance a todos, priorizando populações e grupos historicamente excluídos do acesso ao básico e necessário para uma vida digna, visando a universalização dos serviços no município.",
                    ref: "Resumo Executivo - Produtos A a F (Apresentação do Projeto SanBas, p. 2)."
                },
                { 
                    title: "Sustentabilidade e Gestão de Riscos", 
                    desc: "A formulação de programas e projetos é dificultada pela vulnerabilidade ambiental (como os longos períodos de seca do semiárido) e falhas de infraestrutura. Há o desafio de estruturar metas de curto, médio e longo prazo que englobem educação em saúde, convivência com o semiárido e a recuperação de mananciais.",
                    ref: "Produto E - Programas, Projetos e Ações; Produto D - Prognóstico do Saneamento Básico."
                }
            ];

            return (
                <div className="space-y-4 max-w-4xl mx-auto">
                    {steps.map((step, index) => (
                        <div key={index} className={`custom-border bg-white transition-all overflow-hidden ${activeStep === index ? 'shadow-woodcut' : 'hover:shadow-woodcut-sm'}`}>
                            <button className="w-full px-5 py-5 text-left flex justify-between items-center bg-transparent" onClick={() => setActiveStep(activeStep === index ? -1 : index)}>
                                <span className="font-bold text-pastel-ink font-serif text-lg md:text-xl flex items-center gap-4">
                                    <span className={`flex items-center justify-center shrink-0 w-10 h-10 font-sans text-sm custom-border ${activeStep === index ? 'bg-pastel-peach' : 'bg-pastel-sand'}`}>{index + 1}</span>
                                    {step.title}
                                </span>
                                <IconChevronDown className={`w-6 h-6 transition-transform ${activeStep === index ? 'rotate-180 text-pastel-peach' : 'text-pastel-ink'}`} />
                            </button>
                            <div className={`px-5 md:px-16 transition-all duration-300 ease-in-out border-t-2 border-transparent flex flex-col justify-between ${activeStep === index ? 'py-6 bg-pastel-sand/30 border-pastel-ink max-h-[500px] opacity-100' : 'max-h-0 py-0 opacity-0'}`}>
                                <p className="text-pastel-text text-lg font-sans mb-4 leading-relaxed">{step.desc}</p>
                                <p className="text-xs text-pastel-ink/80 italic font-sans border-t border-pastel-ink/10 pt-3"><strong>Ref:</strong> {step.ref}</p>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // 3. Como será avaliado?
        const ComoContent = () => {
            const [checkedItems, setCheckedItems] = useState([false, false, false]);
            const toggleItem = (index) => {
                const newItems = [...checkedItems];
                newItems[index] = !newItems[index];
                setCheckedItems(newItems);
            };

            const metricas = [
                { 
                    label: "1. Cartografias e Análise Espacial (Leitura Técnica)", 
                    subItems: [
                        { title: "Cartografia Temática", text: "Mapas focados em bacias hidrográficas (Rio Jequitinhonha), áreas de risco, escassez hídrica (semiárido) e proteção ambiental." },
                        { title: "Sistemas de Informação Geográfica (SIG)", text: "Uso de dados digitais para georreferenciar a infraestrutura de saneamento (poços tubulares, barragens, redes de água/esgoto e lixões)." },
                        { title: "Cartografia Social/Participativa", text: "Mapas construídos pelos moradores rurais (povoados e fazendas) para identificar fontes de água, áreas de seca e locais de descarte inadequado." }
                    ],
                    ref: "Produto C - Diagnóstico Técnico-Participativo / SanBas"
                },
                { 
                    label: "2. Pesquisas e Coleta de Dados (Leitura Técnica)", 
                    subItems: [
                        { title: "Pesquisas Socioeconômicas", text: "Levantamentos sobre o perfil demográfico e acesso a serviços básicos, essenciais para entender a exclusão histórica no município." },
                        { title: "Diagnóstico Rápido Participativo (DRP)", text: "Metodologia ágil e direta para coletar informações nas comunidades rurais (que compõem 16,9% da população de Novorizonte)." },
                        { title: "Auditoria de Infraestrutura in loco", text: "Levantamento técnico das condições físicas e operacionais dos sistemas de abastecimento e manejo de resíduos sólidos." }
                    ],
                    ref: "Metodologias do Projeto SanBas / IBGE"
                },
                { 
                    label: "3. Participação Popular e Consulta Social (Leitura Comunitária)", 
                    subItems: [
                        { title: "Audiências e Consultas Públicas", text: "Reuniões formais para apresentação, debate e validação do diagnóstico e dos prognósticos do PMSB junto à população." },
                        { title: "Oficinas de Setorização", text: "Dinâmicas em pequenos grupos (distritos e comunidades) para garantir que as demandas específicas das 26 fazendas sejam incorporadas ao plano." },
                        { title: "Comitês de Coordenação e Executivo", text: "Órgãos colegiados formados por representantes do poder público e sociedade civil para acompanhar e aprovar as etapas do PMSB." }
                    ],
                    ref: "Produtos A e B - Estratégias de Mobilização Social"
                }
            ];

            return (
                <div className="space-y-6 max-w-5xl mx-auto">
                    <div className="mb-8 p-6 bg-pastel-sand/50 custom-border border-l-4 border-l-pastel-peach shadow-woodcut-sm">
                        <p className="font-serif italic text-pastel-ink text-xl leading-relaxed">
                            "A combinação de leitura técnica (cartografias/pesquisas) com a leitura comunitária (participação popular) é a base de um diagnóstico urbanístico eficiente e democrático."
                        </p>
                    </div>

                    {metricas.map((metrica, index) => (
                        <div key={index} onClick={() => toggleItem(index)} className={`cursor-pointer flex items-start gap-5 p-6 custom-border transition-all ${checkedItems[index] ? 'bg-pastel-green/40 shadow-woodcut' : 'bg-white hover:bg-pastel-sand hover:shadow-woodcut-sm'}`}>
                            <div className={`mt-1 transition-colors ${checkedItems[index] ? 'text-pastel-ink' : 'text-pastel-text'}`}>
                                <IconCheckCircle2 className="w-8 h-8" />
                            </div>
                            <div className="flex-1">
                                <div className="flex justify-between items-center w-full">
                                    <h4 className={`text-xl md:text-2xl font-bold font-serif ${checkedItems[index] ? 'text-pastel-ink' : 'text-pastel-text'}`}>
                                        {metrica.label}
                                    </h4>
                                    <IconChevronDown className={`w-6 h-6 transition-transform duration-300 ${checkedItems[index] ? 'rotate-180 text-pastel-ink' : 'text-pastel-text'}`} />
                                </div>
                                
                                <div className={`transition-all duration-300 overflow-hidden ${checkedItems[index] ? 'max-h-[1000px] mt-6 opacity-100' : 'max-h-0 opacity-0'}`}>
                                    <ul className="space-y-4 font-sans text-pastel-text mb-6">
                                        {metrica.subItems.map((sub, sIdx) => (
                                            <li key={sIdx} className="text-lg leading-relaxed border-l-4 border-pastel-ink/20 pl-4">
                                                <strong className="text-pastel-ink">{sub.title}:</strong> {sub.text}
                                            </li>
                                        ))}
                                    </ul>
                                    <p className="text-sm font-sans italic text-pastel-ink/80 pt-3 border-t-2 border-pastel-ink/10">
                                        <strong>Referência:</strong> {metrica.ref}
                                    </p>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };


        // --- MAPA INTERATIVO ---
        const App = () => {
            // Estado do Mapa
            const [pos, setPos] = useState({ x: 0, y: 0 });
            const [zoom, setZoom] = useState(1);
            const [isDragging, setIsDragging] = useState(false);
            const [activeNode, setActiveNode] = useState(null);
            
            // Estado da Passarinha seguindo o cursor
            const [birdTarget, setBirdTarget] = useState({ x: 0, y: 0, flip: false });

            const dragStart = useRef({ x: 0, y: 0 });

            // Funções de Arrastar (Pan) e Rastreamento do Mouse
            const handlePointerDown = (e) => {
                if (e.target.closest('.no-drag')) return; 
                setIsDragging(true);
                dragStart.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
                e.target.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                let currentPosX = pos.x;
                let currentPosY = pos.y;
                
                if (isDragging) {
                    currentPosX = e.clientX - dragStart.current.x;
                    currentPosY = e.clientY - dragStart.current.y;
                    setPos({ x: currentPosX, y: currentPosY });
                }

                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const bX = (e.clientX - centerX - currentPosX) / zoom;
                const bY = (e.clientY - centerY - currentPosY) / zoom;
                
                setBirdTarget(prev => ({
                    x: bX,
                    y: bY,
                    flip: bX < prev.x
                }));
            };

            const handlePointerUp = (e) => {
                setIsDragging(false);
                e.target.releasePointerCapture(e.pointerId);
            };

            const handleWheel = (e) => {
                if (e.target.closest('.no-drag')) return;
                const zoomDelta = e.deltaY * -0.001;
                setZoom(z => Math.min(Math.max(0.4, z + zoomDelta), 2.5));
            };

            const resetView = () => {
                setPos({ x: 0, y: 0 });
                setZoom(1);
            };

            // Dados dos Pinos
            const mapNodes = [
                { id: 'onde', x: -600, y: -150, title: '1. O Território', subtitle: 'Onde será avaliado?', icon: IconMapPin, bg: 'bg-pastel-blue', content: <OndeContent />, modalWidth: 'max-w-[95vw] 2xl:max-w-[1600px]' },
                { id: 'problema', x: 0, y: 250, title: '2. A Justificativa', subtitle: 'Qual o problema?', icon: IconTarget, bg: 'bg-pastel-peach', content: <ProblemaContent />, modalWidth: 'max-w-5xl' },
                { id: 'como', x: 650, y: -50, title: '3. A Metodologia', subtitle: 'Como será avaliado?', icon: IconBookOpen, bg: 'bg-pastel-green', content: <ComoContent />, modalWidth: 'max-w-5xl' }
            ];

            const activeNodeData = mapNodes.find(n => n.id === activeNode);

            // Caminho SVG
            const pathData = `M ${2000 + mapNodes[0].x} ${1500 + mapNodes[0].y} Q ${2000 + mapNodes[0].x + 300} ${1500 + mapNodes[0].y + 400} ${2000 + mapNodes[1].x} ${1500 + mapNodes[1].y} Q ${2000 + mapNodes[1].x + 300} ${1500 + mapNodes[1].y - 300} ${2000 + mapNodes[2].x} ${1500 + mapNodes[2].y}`;

            return (
                <div className="w-screen h-screen overflow-hidden relative map-texture map-grid font-sans select-none"
                     onPointerDown={handlePointerDown}
                     onPointerMove={handlePointerMove}
                     onPointerUp={handlePointerUp}
                     onPointerCancel={handlePointerUp}
                     onWheel={handleWheel}>
                    
                    {/* CONTAINER DO MAPA MUNDO */}
                    <div 
                        className={`absolute top-1/2 left-1/2 w-[4000px] h-[3000px] origin-center ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                        style={{ transform: `translate(calc(-50% + ${pos.x}px), calc(-50% + ${pos.y}px)) scale(${zoom})` }}
                    >
                        
                        <img src="https://i.postimg.cc/Kvn0SL1s/image.png" className="woodcut-bg" style={{ top: '1200px', left: '1200px', width: '400px' }} />
                        <img src="https://i.postimg.cc/GpSQJxfp/image.png" className="woodcut-bg" style={{ top: '1600px', left: '2300px', width: '500px' }} />
                        <img src="https://i.postimg.cc/xCw3BTnQ/image.png" className="woodcut-bg" style={{ top: '1100px', left: '2600px', width: '300px' }} />
                        <img src="https://i.postimg.cc/fTjfgNFT/image.png" className="woodcut-bg" style={{ top: '1800px', left: '1400px', width: '350px' }} />
                        
                        <svg className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40">
                            <path 
                                d={pathData}
                                fill="none" stroke="#2B2624" strokeWidth="6" strokeDasharray="20, 20"
                            />
                        </svg>

                        {/* Personagem "SanBas" */}
                        <div
                            className="absolute z-20 pointer-events-none flex flex-col items-center justify-start transition-all duration-[200ms] ease-out"
                            style={{
                                left: `calc(50% + ${birdTarget.x}px)`,
                                top: `calc(50% + ${birdTarget.y}px)`,
                                transform: 'translate(-50%, -50%)',
                                marginTop: '-60px'
                            }}
                        >
                            <div className={`bg-white rounded-full shadow-woodcut-sm custom-border animate-bounce flex items-center justify-center w-12 h-12 transform transition-transform duration-300 ${birdTarget.flip ? 'scale-x-100' : '-scale-x-100'}`}>
                                <span className="text-2xl leading-none block mt-1">🐦</span>
                            </div>
                        </div>

                        {/* Pinos Interativos */}
                        {mapNodes.map((node) => {
                            const Icon = node.icon;
                            const isActive = activeNode === node.id;
                            return (
                                <div 
                                    key={node.id}
                                    onClick={(e) => { e.stopPropagation(); setActiveNode(node.id); }}
                                    className={`absolute flex flex-col items-center justify-center transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 no-drag cursor-pointer
                                        ${isActive ? 'scale-110 z-20 opacity-0' : 'hover:scale-105 z-10 opacity-100'}`}
                                    style={{ left: `calc(50% + ${node.x}px)`, top: `calc(50% + ${node.y}px)` }}
                                >
                                    <div className="bg-white custom-border shadow-woodcut-sm p-4 mb-4 text-center max-w-[250px] pointer-events-none">
                                        <div className="text-xs font-bold uppercase tracking-wider text-pastel-ink/60">{node.title}</div>
                                        <div className="text-xl font-bold font-serif text-pastel-ink">{node.subtitle}</div>
                                    </div>
                                    
                                    <div className={`w-20 h-20 rounded-full custom-border shadow-woodcut flex items-center justify-center ${node.bg}`}>
                                        <Icon className="w-10 h-10 text-pastel-ink" />
                                    </div>
                                    
                                    <div className="w-16 h-4 bg-pastel-ink/20 rounded-[50%] mt-4 blur-[2px]"></div>
                                </div>
                            );
                        })}
                    </div>


                    {/* --- INTERFACE DE USUÁRIO (OVERLAYS FIXOS) --- */}

                    {/* CABEÇALHO CENTRALIZADO */}
                    <div className={`absolute top-4 md:top-8 left-1/2 transform -translate-x-1/2 z-30 no-drag bg-white/95 backdrop-blur-md custom-border shadow-woodcut w-[90%] max-w-4xl p-5 md:p-8 text-center flex flex-col items-center max-h-[40vh] overflow-y-auto hide-scrollbar pointer-events-auto transition-opacity duration-300 ${activeNode ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                        
                        <div className="font-sans text-[10px] md:text-xs font-bold text-pastel-ink/80 uppercase tracking-widest mb-3 md:mb-4 flex flex-wrap justify-center items-center gap-2">
                            <span>Universidade Federal da Bahia</span>
                            <span className="hidden md:inline">•</span>
                            <span>ARQC10 - Planejamento Urbano e Regional</span>
                        </div>
                        
                        <h1 className="text-2xl md:text-4xl font-bold font-serif text-pastel-ink leading-tight mb-2">
                            Retratos do Saneamento Básico em Novorizonte - MG
                        </h1>
                        <h2 className="text-base md:text-xl font-serif text-pastel-ink/80 mb-5">
                            Diagnóstico, Desafios e Caminhos para a Universalização
                        </h2>
                        
                        <div className="border-t-2 border-pastel-peach pt-4 md:pt-5 w-full">
                            <p className="text-xs md:text-sm font-sans text-pastel-text leading-relaxed mb-4 max-w-3xl mx-auto">
                                Trabalho desenvolvido no escopo da disciplina <strong>ARQC10 - Ateliê de Fundamentação de Planejamento Urbano e Regional</strong>. O objetivo deste material é mapear e analisar as ações já realizadas no âmbito do Plano Municipal de Saneamento Básico (PMSB) desde sua implantação, visando compreender seu nível de execução, avanços e lacunas ao longo do tempo.
                            </p>
                            
                            <div className="flex flex-col md:flex-row items-center justify-center gap-2 md:gap-4 font-sans text-xs text-pastel-text">
                                <span><strong>Discente:</strong> Caio Aphonso Almeida</span>
                                <span className="hidden md:inline">&bull;</span>
                                <span><strong>Docente:</strong> Aline Barroso</span>
                            </div>
                        </div>
                    </div>

                    {/* Dica de Navegação e Controles */}
                    <div className={`transition-opacity duration-300 ${activeNode ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                        <div className="absolute bottom-8 right-8 z-30 no-drag flex flex-col gap-2">
                            <button onClick={() => setZoom(z => Math.min(z + 0.2, 2.5))} className="w-12 h-12 bg-white custom-border shadow-woodcut-sm flex items-center justify-center hover:bg-pastel-sand active:translate-y-1"><IconZoomIn /></button>
                            <button onClick={() => setZoom(z => Math.max(z - 0.2, 0.4))} className="w-12 h-12 bg-white custom-border shadow-woodcut-sm flex items-center justify-center hover:bg-pastel-sand active:translate-y-1"><IconZoomOut /></button>
                            <button onClick={resetView} className="mt-2 text-xs font-bold uppercase bg-pastel-ink text-white py-2 px-2 custom-border hover:bg-black">Resetar</button>
                        </div>
                    </div>

                    {/* JANELA EXPANSÍVEL (MODAL CENTRAL) */}
                    {activeNodeData && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-4 sm:p-6 md:p-12 no-drag pointer-events-auto">
                            
                            {/* Overlay Escuro com Blur */}
                            <div 
                                className="absolute inset-0 bg-pastel-ink/60 backdrop-blur-md animate-fade cursor-pointer"
                                onClick={() => setActiveNode(null)}
                            ></div>
                            
                            {/* Janela Principal */}
                            <div className={`relative w-full ${activeNodeData.modalWidth} max-h-full bg-pastel-bg custom-border shadow-woodcut-lg flex flex-col animate-expand`}>
                                
                                {/* Cabeçalho da Janela */}
                                <div className={`p-6 md:px-8 md:py-6 border-b-2 border-pastel-ink flex items-center justify-between shrink-0 ${activeNodeData.bg}`}>
                                    <div className="flex items-center gap-4 md:gap-6">
                                        <div className="bg-white p-3 custom-border shadow-woodcut hidden sm:block">
                                            <activeNodeData.icon className="w-8 h-8 md:w-10 md:h-10 text-pastel-ink" />
                                        </div>
                                        <div>
                                            <div className="text-sm font-bold uppercase tracking-widest text-pastel-ink/70 mb-1">{activeNodeData.title}</div>
                                            <h2 className="text-3xl md:text-4xl font-bold font-serif text-pastel-ink">{activeNodeData.subtitle}</h2>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => setActiveNode(null)} 
                                        className="p-3 bg-white/60 hover:bg-white custom-border transition-colors shadow-woodcut-sm cursor-pointer ml-4"
                                    >
                                        <IconX className="w-6 h-6 text-pastel-ink"/>
                                    </button>
                                </div>
                                
                                {/* Conteúdo Rolável */}
                                <div className="p-6 md:p-10 overflow-y-auto flex-1 map-texture hide-scrollbar">
                                    {activeNodeData.content}
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
